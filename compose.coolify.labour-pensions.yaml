name: solmara-lab-labour-pensions

x-relay-environment: &relay-environment
  RUST_LOG: ${RUST_LOG:-info}
  REGISTRY_RELAY_AUDIT_HASH_SECRET: ${REGISTRY_RELAY_AUDIT_HASH_SECRET:?set REGISTRY_RELAY_AUDIT_HASH_SECRET}

x-notary-environment: &notary-environment
  RUST_LOG: ${RUST_LOG:-info}
  REGISTRY_NOTARY_AUDIT_HASH_SECRET: ${REGISTRY_NOTARY_AUDIT_HASH_SECRET:?set REGISTRY_NOTARY_AUDIT_HASH_SECRET}
  REGISTRY_NOTARY_POSTGRES_ROOT_CERT_PATH: /etc/solmara/postgres/root.crt

x-relay-common: &relay-common
  image: ${SOLMARA_RELAY_IMAGE:?set digest-pinned Solmara relay image}
  platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
  restart: unless-stopped
  environment: *relay-environment
  depends_on:
    volume-permissions:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "/usr/local/bin/registry-relay", "healthcheck"]
    interval: 30s
    timeout: 10s
    retries: 3

x-notary-common: &notary-common
  image: ${SOLMARA_NOTARY_IMAGE:?set digest-pinned Solmara notary image}
  platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
  restart: unless-stopped
  environment: *notary-environment
  healthcheck:
    test: ["CMD", "/usr/local/bin/registry-notary", "healthcheck"]
    interval: 30s
    timeout: 10s
    retries: 3
  depends_on:
    volume-permissions:
      condition: service_healthy

services:
  volume-permissions:
    image: ${VOLUME_INIT_IMAGE:-busybox:1.36}
    restart: unless-stopped
    command:
      - sh
      - -c
      - chown -R 65532:65532 /relay/* && chown -R 65534:65534 /notary/* && touch /tmp/ready && tail -f /dev/null
    volumes:
      - sipf-pensions-cache:/relay/sipf-pensions-cache
      - sipf-pensions-audit:/relay/sipf-pensions-audit
      - pension-notary-state:/notary/pension-notary-state
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/ready"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: ${SOLMARA_POSTGRES_IMAGE:?set digest-pinned Solmara Postgres image}
    entrypoint: ["/bin/sh", "/usr/local/bin/solmara-postgres-entrypoint.sh"]
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/var/lib/postgresql/server-ssl/server.crt
      - -c
      - ssl_key_file=/var/lib/postgresql/server-ssl/server.key
    environment: &postgres-environment
      POSTGRES_USER: ${SOLMARA_POSTGRES_USER:-solmara_registry}
      POSTGRES_PASSWORD: ${SOLMARA_POSTGRES_PASSWORD}
      POSTGRES_DB: ${SOLMARA_POSTGRES_DB:-solmara_lab}
      SOLMARA_NOTARY_DATABASES: pension
      PENSION_NOTARY_POSTGRES_MIGRATOR_PASSWORD: ${PENSION_NOTARY_POSTGRES_MIGRATOR_PASSWORD}
      PENSION_NOTARY_POSTGRES_RUNTIME_PASSWORD: ${PENSION_NOTARY_POSTGRES_RUNTIME_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  notary-postgresql-bootstrap:
    image: ${SOLMARA_POSTGRES_IMAGE:?set digest-pinned Solmara Postgres image}
    restart: "no"
    entrypoint: ["/bin/sh", "/docker-entrypoint-initdb.d/010-init-notary-postgresql.sh"]
    environment:
      <<: *postgres-environment
      PGHOST: postgres
      PGPASSWORD: ${SOLMARA_POSTGRES_PASSWORD}
      PGSSLMODE: require
    depends_on:
      postgres:
        condition: service_healthy

  sipf-pensions-relay:
    <<: *relay-common
    command: ["--config", "/var/lib/solmara/ministries/labour-pensions/config/relay.yaml"]
    environment:
      <<: *relay-environment
      SIPF_PENSION_SOURCE_HASH: ${SIPF_PENSION_SOURCE_HASH}
      SIPF_CITIZEN_SOURCE_HASH: ${SIPF_CITIZEN_SOURCE_HASH}
      PORTAL_RELAY_TOKEN_HASH: ${PORTAL_RELAY_TOKEN_HASH}
    volumes:
      - sipf-pensions-cache:/var/lib/registry-relay/cache
      - sipf-pensions-audit:/var/lib/registry-relay/audit
    labels:
      solmara.lab.host: sipf-relay.solmara.registrystack.org

  pension-notary:
    <<: *notary-common
    command: ["--config", "/etc/registry-notary/pension.yaml"]
    environment: &pension-notary-environment
      <<: *notary-environment
      REGISTRY_NOTARY_POSTGRES_URL: "postgresql://solmara_notary_pension_runtime:${PENSION_NOTARY_POSTGRES_RUNTIME_PASSWORD}@postgres:5432/solmara_notary_pension?sslmode=require"
      PENSION_CLIENT_TOKEN_HASH: ${PENSION_CLIENT_TOKEN_HASH}
      PENSION_NOTARY_ISSUER_JWK: ${PENSION_NOTARY_ISSUER_JWK}
      CRA_PENSION_SOURCE_RAW: ${CRA_PENSION_SOURCE_RAW}
      NIA_PENSION_SOURCE_RAW: ${NIA_PENSION_SOURCE_RAW}
      SIPF_PENSION_SOURCE_RAW: ${SIPF_PENSION_SOURCE_RAW}
      PROGRAMME_PENSION_SOURCE_RAW: ${PROGRAMME_PENSION_SOURCE_RAW}
    volumes:
      - pension-notary-state:/var/lib/registry-notary/config-state
    depends_on:
      volume-permissions:
        condition: service_healthy
      pension-notary-state-install:
        condition: service_completed_successfully
    labels:
      solmara.lab.host: pension-notary.solmara.registrystack.org

  pension-notary-state-install:
    image: ${SOLMARA_NOTARY_IMAGE:?set digest-pinned Solmara notary image}
    platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
    restart: "no"
    command: ["--config", "/etc/registry-notary/pension.yaml", "state", "install", "--migration-url-env", "REGISTRY_NOTARY_POSTGRES_MIGRATOR_URL", "--owner-role", "solmara_notary_pension_owner", "--runtime-role", "solmara_notary_pension_runtime"]
    environment:
      <<: *pension-notary-environment
      REGISTRY_NOTARY_POSTGRES_MIGRATOR_URL: "postgresql://solmara_notary_pension_migrator:${PENSION_NOTARY_POSTGRES_MIGRATOR_PASSWORD}@postgres:5432/solmara_notary_pension?sslmode=require"
    depends_on:
      notary-postgresql-bootstrap:
        condition: service_completed_successfully

volumes:
  postgres-data:
  sipf-pensions-cache:
  sipf-pensions-audit:
  pension-notary-state:
