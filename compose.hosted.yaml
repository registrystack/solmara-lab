services:
  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  static-metadata:
    ports: !reset []
    labels:
      solmara.lab.host: metadata.solmara.registrystack.org

  scenario-runner:
    profiles: []
    labels:
      solmara.lab.visibility: internal

  home:
    profiles: []
    ports: !reset []
    environment:
      PORTAL_URL: https://portal.solmara.registrystack.org
      # Rewrites the compose-internal URLs the scenario runner reports into the
      # host-reachable *.solmara.registrystack.org URLs shown in previews and curls.
      SOLMARA_PUBLIC_URL_MAP: >-
        {"child-benefit-federator:8080":"https://child-benefit-federator.solmara.registrystack.org",
        "civil-child-benefit-notary:8080":"https://civil-child-benefit-notary.solmara.registrystack.org",
        "nia-child-benefit-notary:8080":"https://nia-child-benefit-notary.solmara.registrystack.org",
        "sro-child-benefit-notary:8080":"https://sro-child-benefit-notary.solmara.registrystack.org",
        "programme-child-benefit-notary:8080":"https://programme-child-benefit-notary.solmara.registrystack.org",
        "pension-notary:8080":"https://pension-notary.solmara.registrystack.org",
        "nagdi-notary:8080":"https://nagdi-notary.solmara.registrystack.org",
        "citizen-notary:8080":"https://citizen-notary.solmara.registrystack.org",
        "cra-civil-relay:8080":"https://cra-relay.solmara.registrystack.org",
        "nia-population-relay:8080":"https://nia-relay.solmara.registrystack.org",
        "sro-social-relay:8080":"https://sro-relay.solmara.registrystack.org",
        "programme-mis-relay:8080":"https://mosd-programme-relay.solmara.registrystack.org",
        "sipf-pensions-relay:8080":"https://sipf-relay.solmara.registrystack.org",
        "nagdi-agriculture-relay:8080":"https://nagdi-relay.solmara.registrystack.org",
        "static-metadata:8080":"https://metadata.solmara.registrystack.org",
        "portal:4000":"https://portal.solmara.registrystack.org"}
    labels:
      solmara.lab.host: solmara.registrystack.org

  cra-civil-relay:
    ports: !reset []
    labels:
      solmara.lab.host: cra-relay.solmara.registrystack.org

  nia-population-relay:
    ports: !reset []
    labels:
      solmara.lab.host: nia-relay.solmara.registrystack.org

  sro-social-relay:
    ports: !reset []
    labels:
      solmara.lab.host: sro-relay.solmara.registrystack.org

  programme-mis-relay:
    ports: !reset []
    labels:
      solmara.lab.host: mosd-programme-relay.solmara.registrystack.org

  sipf-pensions-relay:
    ports: !reset []
    labels:
      solmara.lab.host: sipf-relay.solmara.registrystack.org

  nagdi-agriculture-relay:
    ports: !reset []
    labels:
      solmara.lab.host: nagdi-relay.solmara.registrystack.org

  child-benefit-federator:
    ports: !reset []
    environment:
      CHILD_BENEFIT_PUBLIC_DOMAIN: solmara.registrystack.org
    labels:
      solmara.lab.host: child-benefit-federator.solmara.registrystack.org

  civil-child-benefit-notary:
    ports: !reset []
    labels:
      solmara.lab.host: civil-child-benefit-notary.solmara.registrystack.org

  nia-child-benefit-notary:
    ports: !reset []
    labels:
      solmara.lab.host: nia-child-benefit-notary.solmara.registrystack.org

  sro-child-benefit-notary:
    ports: !reset []
    labels:
      solmara.lab.host: sro-child-benefit-notary.solmara.registrystack.org

  programme-child-benefit-notary:
    ports: !reset []
    labels:
      solmara.lab.host: programme-child-benefit-notary.solmara.registrystack.org

  pension-notary:
    ports: !reset []
    labels:
      solmara.lab.host: pension-notary.solmara.registrystack.org

  nagdi-notary:
    ports: !reset []
    labels:
      solmara.lab.host: nagdi-notary.solmara.registrystack.org

  citizen-notary:
    ports: !reset []
    labels:
      solmara.lab.host: citizen-notary.solmara.registrystack.org

  portal:
    profiles: []
    ports: !reset []
    labels:
      solmara.lab.host: portal.solmara.registrystack.org
