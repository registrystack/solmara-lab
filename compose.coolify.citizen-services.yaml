name: solmara-lab-citizen-services

x-notary-environment: &notary-environment
  RUST_LOG: ${RUST_LOG:-info}
  REGISTRY_NOTARY_AUDIT_HASH_SECRET: ${REGISTRY_NOTARY_AUDIT_HASH_SECRET:?set REGISTRY_NOTARY_AUDIT_HASH_SECRET}
  REGISTRY_NOTARY_POSTGRES_ROOT_CERT_PATH: /etc/solmara/postgres/root.crt

x-notary-common: &notary-common
  image: ${SOLMARA_NOTARY_IMAGE:?set digest-pinned Solmara notary image}
  platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
  restart: unless-stopped
  environment: *notary-environment
  healthcheck:
    test: ["CMD", "/usr/local/bin/registry-notary", "healthcheck"]
    interval: 30s
    timeout: 10s
    retries: 3
  depends_on:
    volume-permissions:
      condition: service_healthy

services:
  volume-permissions:
    image: ${VOLUME_INIT_IMAGE:-busybox:1.36}
    restart: unless-stopped
    command:
      - sh
      - -c
      - chown -R 65534:65534 /notary/* && touch /tmp/ready && tail -f /dev/null
    volumes:
      - citizen-notary-state:/notary/citizen-notary-state
      - citizen-issuer-notary-state:/notary/citizen-issuer-notary-state
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/ready"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: ${SOLMARA_POSTGRES_IMAGE:?set digest-pinned Solmara Postgres image}
    entrypoint: ["/bin/sh", "/usr/local/bin/solmara-postgres-entrypoint.sh"]
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/var/lib/postgresql/server-ssl/server.crt
      - -c
      - ssl_key_file=/var/lib/postgresql/server-ssl/server.key
    environment: &postgres-environment
      POSTGRES_USER: ${SOLMARA_POSTGRES_USER:-solmara_registry}
      POSTGRES_PASSWORD: ${SOLMARA_POSTGRES_PASSWORD}
      POSTGRES_DB: ${SOLMARA_POSTGRES_DB:-solmara_lab}
      SOLMARA_NOTARY_DATABASES: citizen citizen_issuer
      CITIZEN_NOTARY_POSTGRES_MIGRATOR_PASSWORD: ${CITIZEN_NOTARY_POSTGRES_MIGRATOR_PASSWORD}
      CITIZEN_NOTARY_POSTGRES_RUNTIME_PASSWORD: ${CITIZEN_NOTARY_POSTGRES_RUNTIME_PASSWORD}
      CITIZEN_ISSUER_NOTARY_POSTGRES_MIGRATOR_PASSWORD: ${CITIZEN_ISSUER_NOTARY_POSTGRES_MIGRATOR_PASSWORD}
      CITIZEN_ISSUER_NOTARY_POSTGRES_RUNTIME_PASSWORD: ${CITIZEN_ISSUER_NOTARY_POSTGRES_RUNTIME_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  notary-postgresql-bootstrap:
    image: ${SOLMARA_POSTGRES_IMAGE:?set digest-pinned Solmara Postgres image}
    restart: "no"
    entrypoint: ["/bin/sh", "/docker-entrypoint-initdb.d/010-init-notary-postgresql.sh"]
    environment:
      <<: *postgres-environment
      PGHOST: postgres
      PGPASSWORD: ${SOLMARA_POSTGRES_PASSWORD}
      PGSSLMODE: require
    depends_on:
      postgres:
        condition: service_healthy

  citizen-notary:
    <<: *notary-common
    command: ["--config", "/etc/registry-notary/citizen.yaml"]
    environment: &citizen-notary-environment
      <<: *notary-environment
      REGISTRY_NOTARY_POSTGRES_URL: "postgresql://solmara_notary_citizen_runtime:${CITIZEN_NOTARY_POSTGRES_RUNTIME_PASSWORD}@postgres:5432/solmara_notary_citizen?sslmode=require"
      CITIZEN_NOTARY_ISSUER_JWK: ${CITIZEN_NOTARY_ISSUER_JWK}
      CITIZEN_PORTAL_BFF_TOKEN_HASH: ${CITIZEN_PORTAL_BFF_TOKEN_HASH}
      CRA_CITIZEN_SOURCE_RAW: ${CRA_CITIZEN_SOURCE_RAW}
      NIA_CITIZEN_SOURCE_RAW: ${NIA_CITIZEN_SOURCE_RAW}
      SRO_CITIZEN_SOURCE_RAW: ${SRO_CITIZEN_SOURCE_RAW}
      PROGRAMME_CITIZEN_SOURCE_RAW: ${PROGRAMME_CITIZEN_SOURCE_RAW}
      SIPF_CITIZEN_SOURCE_RAW: ${SIPF_CITIZEN_SOURCE_RAW}
      NAGDI_CITIZEN_SOURCE_RAW: ${NAGDI_CITIZEN_SOURCE_RAW}
    volumes:
      - citizen-notary-state:/var/lib/registry-notary/config-state
    depends_on:
      volume-permissions:
        condition: service_healthy
      citizen-notary-state-install:
        condition: service_completed_successfully
    labels:
      solmara.lab.host: citizen-notary.solmara.registrystack.org

  citizen-notary-state-install:
    image: ${SOLMARA_NOTARY_IMAGE:?set digest-pinned Solmara notary image}
    platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
    restart: "no"
    command: ["--config", "/etc/registry-notary/citizen.yaml", "state", "install", "--migration-url-env", "REGISTRY_NOTARY_POSTGRES_MIGRATOR_URL", "--owner-role", "solmara_notary_citizen_owner", "--runtime-role", "solmara_notary_citizen_runtime"]
    environment:
      <<: *citizen-notary-environment
      REGISTRY_NOTARY_POSTGRES_MIGRATOR_URL: "postgresql://solmara_notary_citizen_migrator:${CITIZEN_NOTARY_POSTGRES_MIGRATOR_PASSWORD}@postgres:5432/solmara_notary_citizen?sslmode=require"
    depends_on:
      notary-postgresql-bootstrap:
        condition: service_completed_successfully

  citizen-issuer-notary:
    <<: *notary-common
    command: ["--config", "/etc/registry-notary/citizen-issuer.yaml"]
    environment: &citizen-issuer-notary-environment
      <<: *notary-environment
      REGISTRY_NOTARY_POSTGRES_URL: "postgresql://solmara_notary_citizen_issuer_runtime:${CITIZEN_ISSUER_NOTARY_POSTGRES_RUNTIME_PASSWORD}@postgres:5432/solmara_notary_citizen_issuer?sslmode=require"
      REGISTRY_NOTARY_SENSITIVE_STATE_KEY: ${CITIZEN_ISSUER_NOTARY_SENSITIVE_STATE_KEY}
      CRA_CITIZEN_SOURCE_RAW: ${CRA_CITIZEN_SOURCE_RAW}
      NIA_CITIZEN_SOURCE_RAW: ${NIA_CITIZEN_SOURCE_RAW}
      CITIZEN_ISSUER_NOTARY_ISSUER_JWK: ${CITIZEN_ISSUER_NOTARY_ISSUER_JWK}
      CITIZEN_ISSUER_NOTARY_ACCESS_TOKEN_JWK: ${CITIZEN_ISSUER_NOTARY_ACCESS_TOKEN_JWK}
      CITIZEN_ISSUER_ESIGNET_RP_JWK: ${CITIZEN_ISSUER_ESIGNET_RP_JWK}
    volumes:
      - citizen-issuer-notary-state:/var/lib/registry-notary/config-state
    depends_on:
      volume-permissions:
        condition: service_healthy
      citizen-issuer-notary-state-install:
        condition: service_completed_successfully
    labels:
      solmara.lab.host: citizen-issuer-notary.solmara.registrystack.org

  citizen-issuer-notary-state-install:
    image: ${SOLMARA_NOTARY_IMAGE:?set digest-pinned Solmara notary image}
    platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
    restart: "no"
    command: ["--config", "/etc/registry-notary/citizen-issuer.yaml", "state", "install", "--migration-url-env", "REGISTRY_NOTARY_POSTGRES_MIGRATOR_URL", "--owner-role", "solmara_notary_citizen_issuer_owner", "--runtime-role", "solmara_notary_citizen_issuer_runtime"]
    environment:
      <<: *citizen-issuer-notary-environment
      REGISTRY_NOTARY_POSTGRES_MIGRATOR_URL: "postgresql://solmara_notary_citizen_issuer_migrator:${CITIZEN_ISSUER_NOTARY_POSTGRES_MIGRATOR_PASSWORD}@postgres:5432/solmara_notary_citizen_issuer?sslmode=require"
    depends_on:
      notary-postgresql-bootstrap:
        condition: service_completed_successfully

volumes:
  postgres-data:
  citizen-notary-state:
  citizen-issuer-notary-state:
