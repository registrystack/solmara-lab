server:
  bind: 0.0.0.0:8080
  admin_bind: 0.0.0.0:8081
  openapi_requires_auth: false
  cache_dir: /var/lib/registry-relay/cache
instance:
  id: solmara-sipf-pensions-relay
  environment: hosted_lab
  owner: Social Insurance and Pensions Fund
  jurisdiction: XS
catalog:
  title: SIPF Pensions Relay
  base_url: https://sipf-relay.solmara.registrystack.org
  publisher: Social Insurance and Pensions Fund
  participant_id: did:web:id.registrystack.org:solmara:authority:sipf
vocabularies:
  ps: https://publicschema.org/
  solmara: https://id.registrystack.org/solmara/
auth:
  mode: api_key
  api_keys:
  - id: sipf_pension_source
    fingerprint:
      provider: env
      name: SIPF_PENSION_SOURCE_HASH
    scopes: &id001
    - sipf_pensions:metadata
    - sipf_pensions:rows
    - sipf_pensions:evidence_verification
  - id: sipf_citizen_source
    fingerprint:
      provider: env
      name: SIPF_CITIZEN_SOURCE_HASH
    scopes: *id001
  - id: portal_relay_reader
    fingerprint:
      provider: env
      name: PORTAL_RELAY_TOKEN_HASH
    scopes:
    - sipf_pensions:metadata
audit:
  sink: file
  path: /var/lib/registry-relay/audit/audit.jsonl
  format: jsonl
  hash_secret_env: REGISTRY_RELAY_AUDIT_HASH_SECRET
deployment:
  profile: hosted_lab
  evidence:
    ingress_rate_limit: true
    api_key_rotation: true
  waivers:
  - finding: relay.config.unsigned
    reason: first-pass lab config before governed bundle publication
    expires: '2026-10-01'
datasets:
- id: sipf_pensions
  title: Solmara pensions and social insurance
  description: Pension enrollment, payment, and survivor relationship projection maintained by SIPF.
  owner: Social Insurance and Pensions Fund
  sensitivity: personal
  access_rights: restricted
  update_frequency: daily
  defaults:
    refresh:
      mode: manual
  tables:
  - id: pension_case_table
    materialization: snapshot
    source:
      type: file
      path: /var/lib/solmara/ministries/labour-pensions/fixtures/pension_case.csv
      format:
        csv:
          header_row: 1
    primary_key: pension_case_id
    schema:
      strict: true
      fields:
      - name: pension_case_id
        type: string
        nullable: false
      - name: pensioner_uin
        type: string
        nullable: false
        sensitive: true
      - name: spouse_uin
        type: string
        nullable: true
        sensitive: true
      - name: marriage_mrn
        type: string
        nullable: true
        sensitive: true
      - name: pension_status
        type: string
        nullable: false
      - name: payment_status
        type: string
        nullable: false
      - name: survivor_eligible
        type: boolean
        nullable: false
      - name: last_payment_date
        type: date
        nullable: true
      - name: account_life_status
        type: string
        nullable: true
      - name: observed_at
        type: timestamp
        nullable: true
      - name: source_system
        type: string
        nullable: false
  entities:
  - name: pension_case
    title: Pension case
    description: Current pension status and survivor eligibility projection.
    table: pension_case_table
    concept_uri: solmara:PensionCase
    fields:
    - name: id
      from: pension_case_id
    - name: pensioner_uin
      sensitive: true
    - name: spouse_uin
      sensitive: true
    - name: marriage_mrn
    - name: pension_status
    - name: payment_status
    - name: survivor_eligible
    - name: last_payment_date
    - name: observed_at
    access:
      metadata_scope: sipf_pensions:metadata
      aggregate_scope: sipf_pensions:aggregate
      read_scope: sipf_pensions:rows
      evidence_verification_scope: sipf_pensions:evidence_verification
    api:
      default_limit: 25
      max_limit: 100
      require_purpose_header: true
      governed_policy:
        permitted_purposes:
        - https://id.registrystack.org/solmara/purpose/pension-payment-review
        - https://id.registrystack.org/solmara/purpose/survivor-benefit-determination
        - https://id.registrystack.org/solmara/purpose/citizen-self-service
      allowed_filters:
      - field: pensioner_uin
        ops:
        - eq
        - in
      - field: spouse_uin
        ops:
        - eq
      - field: pension_status
        ops:
        - eq
