server:
  bind: 0.0.0.0:8080
  openapi_requires_auth: false
  admin_listener:
    mode: dedicated
    bind: 0.0.0.0:8081
instance:
  id: solmara-nia-child-benefit-notary
  environment: hosted_lab
  owner: National Identity Agency
  jurisdiction: XS
  public_base_url: https://nia-child-benefit-notary.solmara.registrystack.org
auth:
  mode: api_key
  api_keys:
  - id: nia_child_benefit_client
    fingerprint:
      provider: env
      name: NIA_CHILD_BENEFIT_CLIENT_TOKEN_HASH
    scopes:
    - nia_population:evidence_verification
    authorization_details:
      type: registry-notary/evidence-authorization/v1
      schema_version: v1
      legal_basis_ref: https://id.registrystack.org/solmara/legal-basis/child-benefit-act
      consent_ref: https://id.registrystack.org/solmara/consent/child-benefit-review
      jurisdiction: XS
      assurance_level: substantial
audit:
  sink: file
  path: /var/lib/registry-notary/config-state/audit.jsonl
  hash_secret_env: REGISTRY_NOTARY_AUDIT_HASH_SECRET
state:
  storage: postgresql
  postgresql:
    url_env: REGISTRY_NOTARY_POSTGRES_URL
    root_certificate_path: ${REGISTRY_NOTARY_POSTGRES_ROOT_CERT_PATH}
    connect_timeout_ms: 5000
    operation_timeout_ms: 2000
deployment:
  profile: hosted_lab
cel:
  worker_count: 8
  worker_memory_bytes: 1073741824
evidence:
  enabled: true
  service_id: nia-child-benefit-notary
  api_base_url: https://nia-child-benefit-notary.solmara.registrystack.org
  allowed_purposes:
  - https://id.registrystack.org/solmara/purpose/child-benefit-review
  source_connections:
    population:
      base_url: https://nia-relay.solmara.registrystack.org
      token_env: NIA_CHILD_BENEFIT_SOURCE_RAW
  signing_keys:
    nia-child-benefit-federation:
      provider: local_jwk_env
      private_jwk_env: NIA_CHILD_BENEFIT_FEDERATION_RESPONSE_JWK
      alg: EdDSA
      kid: did:web:nia-child-benefit-notary.solmara.registrystack.org#federation-key-1
      status: active
  claims:
  - id: population-record-active
    title: Population record active
    version: 2026-07
    subject_type: person
    value:
      type: boolean
    source_bindings:
      population:
        connector: registry_data_api
        connection: population
        required_scope: nia_population:evidence_verification
        dataset: nia_population
        entity: person
        matching:
          allowed_purposes:
          - https://id.registrystack.org/solmara/purpose/child-benefit-review
          permitted_jurisdictions:
          - XS
          require_legal_basis: true
          require_consent: true
        lookup:
          input: target.identifiers.solmara_uin
          field: id
          op: eq
          cardinality: one
        fields:
          identity_status:
            field: identity_status
            type: string
            required: true
          alive:
            field: alive
            type: boolean
            required: true
    rule:
      type: cel
      expression: source.population.identity_status == 'active' && source.population.alive == true
    disclosure:
      default: predicate
      allowed:
      - predicate
      - redacted
    formats:
    - application/vnd.registry-notary.claim-result+json
federation:
  enabled: true
  node_id: did:web:nia-child-benefit-notary.solmara.registrystack.org
  issuer: https://nia-child-benefit-notary.solmara.registrystack.org
  jwks_uri: https://nia-child-benefit-notary.solmara.registrystack.org/.well-known/evidence/jwks.json
  federation_api: https://nia-child-benefit-notary.solmara.registrystack.org/federation/v1
  supported_protocol_versions:
  - registry-notary-federation/v0.1
  signing:
    signing_key: nia-child-benefit-federation
  pairwise_subject_hash:
    secret_env: NIA_CHILD_BENEFIT_PAIRWISE_SECRET
  response_shaping:
    minimum_denial_latency_ms: 10
  emergency_denylist:
    node_ids: []
    kids: []
  peers:
  - node_id: did:web:child-benefit-federator.solmara.registrystack.org
    issuer: https://child-benefit-federator.solmara.registrystack.org
    jwks_uri: https://child-benefit-federator.solmara.registrystack.org/.well-known/jwks.json
    allowed_protocol_versions:
    - registry-notary-federation/v0.1
    allowed_purposes:
    - https://id.registrystack.org/solmara/purpose/child-benefit-review
    allowed_profiles:
    - population_record_active
    source_scopes:
    - nia_population:evidence_verification
  evaluation_profiles:
  - id: population_record_active
    ruleset: population-record-active-v1
    claim_id: population-record-active
    subject_id_type: solmara_uin
    disclosure: predicate
    legal_basis_ref: https://id.registrystack.org/solmara/legal-basis/child-benefit-act
    consent_ref: https://id.registrystack.org/solmara/consent/child-benefit-review
    jurisdiction: XS
    assurance_level: substantial
