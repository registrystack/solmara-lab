server:
  bind: 0.0.0.0:8080
  openapi_requires_auth: false
  admin_listener:
    mode: dedicated
    bind: 0.0.0.0:8081

instance:
  id: solmara-citizen-issuer-notary
  environment: hosted_lab
  owner: Citizen Services Portal
  jurisdiction: XS
  public_base_url: https://citizen-issuer-notary.solmara.registrystack.org

auth:
  mode: oidc
  oidc:
    issuer: https://esignet.solmara.registrystack.org
    jwks_url: https://esignet.solmara.registrystack.org/v1/esignet/oauth/.well-known/jwks.json
    userinfo_endpoint: https://esignet.solmara.registrystack.org/v1/esignet/oidc/userinfo
    audiences:
      - solmara-citizen-issuer
    allowed_clients:
      - solmara-citizen-issuer
    allowed_algorithms:
      - RS256
    allowed_token_types: []
    scope_claim: scope
    scope_separator: " "
    principal_claim: sub
    leeway: 60s
  access_token_signing:
    enabled: true
    issuer: https://citizen-issuer-notary.solmara.registrystack.org
    audiences:
      - https://citizen-issuer-notary.solmara.registrystack.org
    allowed_algorithms:
      - EdDSA
    token_typ: registry-notary-access+jwt
    signing_key_id: citizen-issuer-access-token
    access_token_ttl_seconds: 300

audit:
  sink: file
  path: /var/lib/registry-notary/config-state/audit.jsonl
  hash_secret_env: REGISTRY_NOTARY_AUDIT_HASH_SECRET

replay:
  storage: redis
  redis:
    url_env: REGISTRY_NOTARY_REPLAY_REDIS_URL
    key_prefix: solmara-citizen-issuer-notary
    connect_timeout_ms: 1000
    operation_timeout_ms: 500

deployment:
  profile: hosted_lab

cel:
  worker_count: 8
  worker_memory_bytes: 1073741824

evidence:
  enabled: true
  service_id: citizen-issuer-notary
  api_base_url: https://citizen-issuer-notary.solmara.registrystack.org
  allowed_purposes:
    - https://id.registrystack.org/solmara/purpose/citizen-self-service
  source_connections:
    civil:
      base_url: http://cra-civil-relay:8080
      allow_insecure_private_network: true
      token_env: CRA_CITIZEN_SOURCE_RAW
    population:
      base_url: http://nia-population-relay:8080
      allow_insecure_private_network: true
      token_env: NIA_CITIZEN_SOURCE_RAW
  signing_keys:
    citizen-issuer:
      provider: local_jwk_env
      private_jwk_env: CITIZEN_ISSUER_NOTARY_ISSUER_JWK
      alg: EdDSA
      kid: did:web:citizen-issuer-notary.solmara.registrystack.org#issuer-key-1
      status: active
    citizen-issuer-access-token:
      provider: local_jwk_env
      private_jwk_env: CITIZEN_ISSUER_NOTARY_ACCESS_TOKEN_JWK
      alg: EdDSA
      kid: did:web:citizen-issuer-notary.solmara.registrystack.org#access-token-key-1
      status: active
    esignet-rp-key:
      provider: local_jwk_env
      private_jwk_env: CITIZEN_ISSUER_ESIGNET_RP_JWK
      alg: RS256
      kid: solmara-citizen-issuer-key-1
      status: active
  credential_profiles:
    citizen_status_sd_jwt:
      format: application/dc+sd-jwt
      issuer: did:web:citizen-issuer-notary.solmara.registrystack.org
      signing_key: citizen-issuer
      vct: https://citizen-issuer-notary.solmara.registrystack.org/credentials/citizen-status/v1
      validity_seconds: 600
      allowed_claims:
        - population-record-active
        - civil-record-linked
        - citizen-self-service-summary
      holder_binding:
        mode: did
        proof_of_possession: required
        allowed_did_methods:
          - did:jwk
      disclosure:
        allowed:
          - predicate
  claims:
    - id: population-record-active
      title: Population record active
      version: "2026-07"
      subject_type: person
      purpose: https://id.registrystack.org/solmara/purpose/citizen-self-service
      value:
        type: boolean
      source_bindings:
        population:
          connector: registry_data_api
          connection: population
          required_scope: nia_population:evidence_verification
          dataset: nia_population
          entity: person
          matching: &citizen_issuer_matching
            allowed_purposes:
              - https://id.registrystack.org/solmara/purpose/citizen-self-service
            permitted_jurisdictions: [XS]
            require_legal_basis: true
            require_consent: true
          lookup:
            input: target.identifiers.solmara_uin
            field: id
            op: eq
            cardinality: one
          fields:
            identity_status:
              field: identity_status
              type: string
              required: true
            alive:
              field: alive
              type: boolean
              required: true
      rule:
        type: cel
        expression: "source.population.identity_status == 'active' && source.population.alive == true"
      disclosure: &predicate_only
        default: predicate
        allowed:
          - predicate
          - redacted
      formats: &claim_formats
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
      credential_profiles:
        - citizen_status_sd_jwt
    - id: civil-record-linked
      title: Civil record linked
      version: "2026-07"
      subject_type: person
      purpose: https://id.registrystack.org/solmara/purpose/citizen-self-service
      value:
        type: boolean
      source_bindings:
        civil:
          connector: registry_data_api
          connection: civil
          required_scope: cra_civil:evidence_verification
          dataset: cra_civil
          entity: civil_person
          matching: *citizen_issuer_matching
          lookup:
            input: target.identifiers.solmara_uin
            field: id
            op: eq
            cardinality: one
          fields:
            birth_brn:
              field: birth_brn
              type: string
              required: false
      rule:
        type: exists
        source: civil
      disclosure: *predicate_only
      formats: *claim_formats
      credential_profiles:
        - citizen_status_sd_jwt
    - id: citizen-self-service-summary
      title: Citizen self-service summary
      version: "2026-07"
      subject_type: person
      purpose: https://id.registrystack.org/solmara/purpose/citizen-self-service
      value:
        type: boolean
      depends_on:
        - population-record-active
        - civil-record-linked
      rule:
        type: cel
        expression: "claims.population_record_active.value == true && claims.civil_record_linked.value == true"
        bindings:
          claims:
            population_record_active:
              claim: population-record-active
            civil_record_linked:
              claim: civil-record-linked
      disclosure: *predicate_only
      formats: *claim_formats
      credential_profiles:
        - citizen_status_sd_jwt

self_attestation:
  enabled: true
  subject_binding:
    token_claim: individual_id
    claim_source: userinfo
    id_type: solmara_uin
  citizen_clients:
    allowed_client_ids:
      - solmara-citizen-issuer
    allowed_audiences:
      - solmara-citizen-issuer
  token_policy:
    assurance_claim_source: id_token
    max_auth_age_seconds: 1200
    max_access_token_lifetime_seconds: 1200
    max_evaluation_age_seconds: 300
    max_credential_validity_seconds: 600
    max_clock_leeway_seconds: 60
  allowed_operations:
    evaluate: false
    render: false
    issue_credential: true
    batch_evaluate: false
  allowed_purposes:
    - https://id.registrystack.org/solmara/purpose/citizen-self-service
  allowed_claims:
    - citizen-self-service-summary
  allowed_formats:
    - application/dc+sd-jwt
  allowed_disclosures:
    - predicate
    - redacted
  scope_policy: disabled
  credential_profiles:
    - citizen_status_sd_jwt
  allowed_wallet_origins:
    - https://wallet.solmara.registrystack.org
  rate_limits:
    mode: in_process
    invalid_token_per_client_address_per_minute: 20
    per_principal_per_minute: 10
    subject_mismatch_per_principal_per_hour: 5
    per_holder_per_hour: 10
    credential_issuance_per_principal_per_hour: 5
    tx_code_attempts_per_code_per_minute: 10

oid4vci:
  enabled: true
  credential_issuer: https://citizen-issuer-notary.solmara.registrystack.org
  authorization_servers:
    - https://esignet.solmara.registrystack.org
  accepted_token_audiences:
    - https://citizen-issuer-notary.solmara.registrystack.org
    - solmara-citizen-issuer
  credential_endpoint: https://citizen-issuer-notary.solmara.registrystack.org/oid4vci/credential
  offer_endpoint: https://citizen-issuer-notary.solmara.registrystack.org/oid4vci/credential-offer
  nonce_endpoint: https://citizen-issuer-notary.solmara.registrystack.org/oid4vci/nonce
  display:
    - name: Solmara Citizen Issuer
      locale: en-US
      logo:
        uri: https://registrystack.org/favicon.svg
        alt_text: Registry Stack logo
  nonce:
    enabled: true
    ttl_seconds: 300
  authorization:
    require_pkce_method: S256
  proof:
    max_age_seconds: 300
    max_clock_skew_seconds: 30
  pre_authorized_code:
    enabled: true
    pre_authorized_code_ttl_seconds: 300
    tx_code:
      required: true
      input_mode: numeric
      length: 6
    esignet:
      client_id: solmara-citizen-issuer
      client_signing_key_id: esignet-rp-key
      redirect_uri: https://citizen-issuer-notary.solmara.registrystack.org/oid4vci/offer/callback
      authorize_url: https://esignet-ui.solmara.registrystack.org/authorize
      token_url: https://esignet.solmara.registrystack.org/v1/esignet/oauth/v2/token
      issuer: https://esignet.solmara.registrystack.org
      jwks_uri: https://esignet.solmara.registrystack.org/v1/esignet/oauth/.well-known/jwks.json
      userinfo_url: https://esignet.solmara.registrystack.org/v1/esignet/oidc/userinfo
      scopes:
        - openid
        - profile
      login_state_ttl_seconds: 300
  credential_configurations:
    citizen_status_sd_jwt:
      claim_id: citizen-self-service-summary
      credential_profile: citizen_status_sd_jwt
      format: dc+sd-jwt
      scope: citizen-self-service-status
      vct: https://citizen-issuer-notary.solmara.registrystack.org/credentials/citizen-status/v1
      display_name: Solmara Citizen Status
      display:
        locale: en-US
        logo:
          url: https://registrystack.org/favicon.svg
          alt_text: Registry Stack logo
        description: Predicate attestation that the population record is active and linked to the civil registry.
        background_color: "#006D77"
        text_color: "#FFFFFF"
      proof_signing_alg_values_supported:
        - EdDSA
      cryptographic_binding_methods_supported:
        - did:jwk
