server:
  bind: 0.0.0.0:8080
  openapi_requires_auth: false
  admin_listener:
    mode: dedicated
    bind: 0.0.0.0:8081

instance:
  id: solmara-civil-child-benefit-notary
  environment: hosted_lab
  owner: Civil Registration Authority
  jurisdiction: XS
  public_base_url: https://civil-child-benefit-notary.lab.registrystack.org

auth:
  mode: api_key
  api_keys:
    - id: civil_child_benefit_client
      fingerprint:
        provider: env
        name: CIVIL_CHILD_BENEFIT_CLIENT_TOKEN_HASH
      scopes:
        - cra_civil:evidence_verification
      authorization_details:
        type: registry-notary/evidence-authorization/v1
        schema_version: v1
        legal_basis_ref: https://id.registrystack.org/solmara/legal-basis/child-benefit-act
        consent_ref: https://id.registrystack.org/solmara/consent/child-benefit-review
        jurisdiction: XS
        assurance_level: substantial

audit:
  sink: file
  path: /var/lib/registry-notary/config-state/audit.jsonl
  hash_secret_env: REGISTRY_NOTARY_AUDIT_HASH_SECRET

state:
  storage: postgresql
  postgresql:
    url_env: REGISTRY_NOTARY_POSTGRES_URL
    root_certificate_path: ${REGISTRY_NOTARY_POSTGRES_ROOT_CERT_PATH}
    connect_timeout_ms: 5000
    operation_timeout_ms: 2000

deployment:
  profile: hosted_lab

cel:
  worker_count: 8
  worker_memory_bytes: 1073741824

evidence:
  enabled: true
  service_id: civil-child-benefit-notary
  api_base_url: http://civil-child-benefit-notary:8080
  allowed_purposes:
    - https://id.registrystack.org/solmara/purpose/child-benefit-review
  source_connections:
    civil:
      base_url: http://cra-civil-relay:8080
      allow_insecure_private_network: true
      token_env: CRA_CHILD_BENEFIT_SOURCE_RAW
  signing_keys:
    civil-child-benefit-federation:
      provider: local_jwk_env
      private_jwk_env: CIVIL_CHILD_BENEFIT_FEDERATION_RESPONSE_JWK
      alg: EdDSA
      kid: did:web:civil-child-benefit-notary.lab.registrystack.org#federation-key-1
      status: active
  claims:
    - id: birth-is-registered
      title: Birth is registered
      version: "2026-07"
      subject_type: person
      value:
        type: boolean
      semantics:
        concept: https://publicschema.org/crvs/Birth
        predicate: https://id.registrystack.org/solmara/claim/birth-is-registered
      source_bindings:
        civil:
          connector: registry_data_api
          connection: civil
          required_scope: cra_civil:evidence_verification
          dataset: cra_civil
          entity: civil_person
          matching: &civil_child_benefit_matching
            allowed_purposes:
              - https://id.registrystack.org/solmara/purpose/child-benefit-review
            permitted_jurisdictions: [XS]
            require_legal_basis: true
            require_consent: true
          lookup:
            input: target.identifiers.solmara_uin
            field: id
            op: eq
            cardinality: one
          fields:
            birth_brn:
              field: birth_brn
              type: string
              required: true
      rule:
        type: cel
        expression: "source.civil.birth_brn != ''"
      disclosure: &predicate_only
        default: predicate
        allowed:
          - predicate
          - redacted
      formats: &claim_formats
        - application/vnd.registry-notary.claim-result+json
    - id: child-age-under-5
      title: Child age under five
      version: "2026-07"
      subject_type: person
      value:
        type: boolean
      source_bindings:
        civil:
          connector: registry_data_api
          connection: civil
          required_scope: cra_civil:evidence_verification
          dataset: cra_civil
          entity: civil_person
          matching: *civil_child_benefit_matching
          lookup:
            input: target.identifiers.solmara_uin
            field: id
            op: eq
            cardinality: one
          fields:
            birth_date:
              field: birth_date
              type: date
              required: true
            deceased:
              field: deceased
              type: boolean
              required: true
      rule:
        type: cel
        expression: "source.civil.deceased == false && date.age_on(source.civil.birth_date, ctx.today) < 5"
      disclosure: *predicate_only
      formats: *claim_formats

federation:
  enabled: true
  node_id: did:web:civil-child-benefit-notary.lab.registrystack.org
  issuer: https://civil-child-benefit-notary.lab.registrystack.org
  jwks_uri: https://civil-child-benefit-notary.lab.registrystack.org/.well-known/evidence/jwks.json
  federation_api: https://civil-child-benefit-notary.lab.registrystack.org/federation/v1
  supported_protocol_versions:
    - registry-notary-federation/v0.1
  signing:
    signing_key: civil-child-benefit-federation
  pairwise_subject_hash:
    secret_env: CIVIL_CHILD_BENEFIT_PAIRWISE_SECRET
  response_shaping:
    minimum_denial_latency_ms: 10
  emergency_denylist:
    node_ids: []
    kids: []
  peers:
    - node_id: did:web:child-benefit-federator.lab.registrystack.org
      issuer: https://child-benefit-federator.lab.registrystack.org
      jwks_uri: http://child-benefit-federator:8080/.well-known/jwks.json
      allow_insecure_private_network: true
      allowed_protocol_versions:
        - registry-notary-federation/v0.1
      allowed_purposes:
        - https://id.registrystack.org/solmara/purpose/child-benefit-review
      allowed_profiles:
        - birth_is_registered
        - child_age_under_5
      source_scopes:
        - cra_civil:evidence_verification
  evaluation_profiles:
    - id: birth_is_registered
      ruleset: birth-is-registered-v1
      claim_id: birth-is-registered
      subject_id_type: solmara_uin
      disclosure: predicate
      legal_basis_ref: https://id.registrystack.org/solmara/legal-basis/child-benefit-act
      consent_ref: https://id.registrystack.org/solmara/consent/child-benefit-review
      jurisdiction: XS
      assurance_level: substantial
    - id: child_age_under_5
      ruleset: child-age-under-5-v1
      claim_id: child-age-under-5
      subject_id_type: solmara_uin
      disclosure: predicate
      legal_basis_ref: https://id.registrystack.org/solmara/legal-basis/child-benefit-act
      consent_ref: https://id.registrystack.org/solmara/consent/child-benefit-review
      jurisdiction: XS
      assurance_level: substantial
