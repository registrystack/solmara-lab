      - ./config/postgres/ssl/server.crt:/etc/solmara/postgres/root.crt:ro
      - programme-workload-token:/run/secrets:ro
    depends_on:
      programme-mis-relay:
        condition: service_healthy
      programme-workload-agent:
        condition: service_healthy
