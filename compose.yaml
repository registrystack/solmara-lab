      - ./config/postgres/ssl/server.crt:/etc/solmara/postgres/root.crt:ro
      - sro-workload-token:/run/secrets:ro
    depends_on:
      registry-postgresql-bootstrap:
        condition: service_completed_successfully
      sro-workload-agent:
        condition: service_healthy

  programme-notary:
    <<: *notary-common
    command: ["--config", "/etc/registry-notary/notary.yaml"]
    network_mode: service:programme-mis-relay
    environment: &programme-notary-environment
      <<: *notary-environment
