        condition: service_healthy

  portal:
    build:
      context: ./portal
    image: ${SOLMARA_PORTAL_IMAGE:-solmara-lab-portal:local}
    environment:
      HOST: 0.0.0.0
      PORT: 4000
      PORTAL_PROVIDER: live
      PORTAL_AUTH_PROVIDER: ${PORTAL_AUTH_PROVIDER:-mock}
      PORTAL_SESSION_SECRET: ${PORTAL_SESSION_SECRET}
      CHILD_BENEFIT_FEDERATOR_URL: http://child-benefit-federator:8080
      CHILD_BENEFIT_FEDERATOR_TOKEN: ${CHILD_BENEFIT_FEDERATOR_TOKEN}
      CRA_NOTARY_URL: http://cra-notary:8081
      CRA_PENSION_CLIENT_TOKEN: ${CRA_PENSION_CLIENT_TOKEN}
      CRA_CITIZEN_CLIENT_TOKEN: ${CRA_CITIZEN_CLIENT_TOKEN}
      NIA_NOTARY_URL: http://nia-notary:8081
      NIA_CITIZEN_CLIENT_TOKEN: ${NIA_CITIZEN_CLIENT_TOKEN}
      SIPF_NOTARY_URL: http://sipf-notary:8081
      SIPF_PENSION_CLIENT_TOKEN: ${SIPF_PENSION_CLIENT_TOKEN}
      NAGDI_NOTARY_URL: http://nagdi-notary:8081
      NAGDI_NOTARY_TOKEN: ${NAGDI_NOTARY_TOKEN}
    ports:
      - "${SOLMARA_PORTAL_PORT:-4300}:4000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      child-benefit-federator:
        condition: service_healthy
      cra-notary:
        condition: service_healthy
      sipf-notary:
        condition: service_healthy
      nagdi-notary:
        condition: service_healthy
      nia-notary:
        condition: service_healthy
      scenario-runner:
        condition: service_healthy

volumes:
  postgres-data:
  cra-relay-cache:
  nia-relay-cache:
  sro-relay-cache:
  programme-relay-cache:
  sipf-relay-cache:
  nagdi-relay-cache:
  cra-workload-token:
  nia-workload-token:
  nia-esignet-workload-token:
  sro-workload-token:
  programme-workload-token:
  sipf-workload-token:
