x-relay-environment: &relay-environment
  RUST_LOG: ${RUST_LOG:-info}
  # Required-variable guard: any compose invocation that skips .env (for
  # example --env-file versions.env alone) must abort here instead of
  # recreating services with empty credentials. Start the stack with just up.
  REGISTRY_RELAY_AUDIT_HASH_SECRET: ${REGISTRY_RELAY_AUDIT_HASH_SECRET:?.env not loaded; run just gen-secrets once, then just up}

x-notary-environment: &notary-environment
  RUST_LOG: ${RUST_LOG:-info}
  REGISTRY_NOTARY_AUDIT_HASH_SECRET: ${REGISTRY_NOTARY_AUDIT_HASH_SECRET:?.env not loaded; run just gen-secrets once, then just up}
  REGISTRY_NOTARY_POSTGRES_ROOT_CERT_PATH: /etc/solmara/postgres/root.crt

x-relay-common: &relay-common
  image: ${REGISTRY_RELAY_IMAGE:-ghcr.io/registrystack/registry-relay@sha256:93e194500a3500ba3f6331d5a0a9a3069127c48a709beccb083a5fcbdbc3ec61}
  platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
  restart: unless-stopped
  environment: *relay-environment
  healthcheck:
    test: ["CMD", "/usr/local/bin/registry-relay", "healthcheck"]
    interval: 30s
    timeout: 10s
    retries: 3

x-notary-common: &notary-common
  image: ${REGISTRY_NOTARY_IMAGE:-ghcr.io/registrystack/registry-notary@sha256:0cf05184885d7ed17dd9889e20f3797eb2a9ad07517f4ac7c05c03b774a00b8f}
  platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
  restart: unless-stopped
  environment: *notary-environment
  healthcheck:
    test: ["CMD", "/usr/local/bin/registry-notary", "healthcheck"]
    interval: 30s
    timeout: 10s
    retries: 3

services:
  volume-permissions:
    image: ${VOLUME_INIT_IMAGE:-busybox:1.36}
    command:
      - sh
      - -c
      - chown -R 65532:65532 /relay/* && chown -R 65534:65534 /notary/*
    volumes:
      - cra-civil-cache:/relay/cra-civil-cache
      - cra-civil-audit:/relay/cra-civil-audit
      - nia-population-cache:/relay/nia-population-cache
      - nia-population-audit:/relay/nia-population-audit
      - sro-social-cache:/relay/sro-social-cache
      - sro-social-audit:/relay/sro-social-audit
      - programme-mis-cache:/relay/programme-mis-cache
      - programme-mis-audit:/relay/programme-mis-audit
      - sipf-pensions-cache:/relay/sipf-pensions-cache
      - sipf-pensions-audit:/relay/sipf-pensions-audit
      - nagdi-agriculture-cache:/relay/nagdi-agriculture-cache
      - nagdi-agriculture-audit:/relay/nagdi-agriculture-audit
      - civil-child-benefit-notary-state:/notary/civil-child-benefit-notary-state
      - nia-child-benefit-notary-state:/notary/nia-child-benefit-notary-state
      - sro-child-benefit-notary-state:/notary/sro-child-benefit-notary-state
      - programme-child-benefit-notary-state:/notary/programme-child-benefit-notary-state
      - pension-notary-state:/notary/pension-notary-state
      - nagdi-notary-state:/notary/nagdi-notary-state
      - citizen-notary-state:/notary/citizen-notary-state
      - citizen-issuer-notary-state:/notary/citizen-issuer-notary-state

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    entrypoint: ["/bin/sh", "/usr/local/bin/solmara-postgres-entrypoint.sh"]
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/var/lib/postgresql/server-ssl/server.crt
      - -c
      - ssl_key_file=/var/lib/postgresql/server-ssl/server.key
    environment: &postgres-environment
      POSTGRES_USER: ${SOLMARA_POSTGRES_USER:-solmara_registry}
      POSTGRES_PASSWORD: ${SOLMARA_POSTGRES_PASSWORD}
      POSTGRES_DB: ${SOLMARA_POSTGRES_DB:-solmara_lab}
      SOLMARA_NOTARY_DATABASES: civil_child_benefit nia_child_benefit sro_child_benefit programme_child_benefit pension nagdi citizen citizen_issuer
      CIVIL_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD: ${CIVIL_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD}
      CIVIL_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD: ${CIVIL_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD}
      NIA_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD: ${NIA_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD}
      NIA_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD: ${NIA_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD}
      SRO_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD: ${SRO_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD}
      SRO_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD: ${SRO_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD}
      PROGRAMME_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD: ${PROGRAMME_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD}
      PROGRAMME_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD: ${PROGRAMME_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD}
      PENSION_NOTARY_POSTGRES_MIGRATOR_PASSWORD: ${PENSION_NOTARY_POSTGRES_MIGRATOR_PASSWORD}
      PENSION_NOTARY_POSTGRES_RUNTIME_PASSWORD: ${PENSION_NOTARY_POSTGRES_RUNTIME_PASSWORD}
      NAGDI_NOTARY_POSTGRES_MIGRATOR_PASSWORD: ${NAGDI_NOTARY_POSTGRES_MIGRATOR_PASSWORD}
      NAGDI_NOTARY_POSTGRES_RUNTIME_PASSWORD: ${NAGDI_NOTARY_POSTGRES_RUNTIME_PASSWORD}
      CITIZEN_NOTARY_POSTGRES_MIGRATOR_PASSWORD: ${CITIZEN_NOTARY_POSTGRES_MIGRATOR_PASSWORD}
      CITIZEN_NOTARY_POSTGRES_RUNTIME_PASSWORD: ${CITIZEN_NOTARY_POSTGRES_RUNTIME_PASSWORD}
      CITIZEN_ISSUER_NOTARY_POSTGRES_MIGRATOR_PASSWORD: ${CITIZEN_ISSUER_NOTARY_POSTGRES_MIGRATOR_PASSWORD}
      CITIZEN_ISSUER_NOTARY_POSTGRES_RUNTIME_PASSWORD: ${CITIZEN_ISSUER_NOTARY_POSTGRES_RUNTIME_PASSWORD}
    ports:
      - "${SOLMARA_POSTGRES_PORT:-54329}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./ministries/interior-population/fixtures/001-schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
      - ./ministries/interior-population/fixtures/002-load.sql:/docker-entrypoint-initdb.d/002-load.sql:ro
      - ./ministries/interior-population/fixtures/population_person.csv:/docker-entrypoint-initdb.d/population_person.csv:ro
      - ./ministries/interior-population/fixtures/identity_document.csv:/docker-entrypoint-initdb.d/identity_document.csv:ro
      - ./ministries/interior-population/fixtures/consent_directive.csv:/docker-entrypoint-initdb.d/consent_directive.csv:ro
      - ./scripts/init-notary-postgresql.sh:/docker-entrypoint-initdb.d/010-init-notary-postgresql.sh:ro
      - ./scripts/postgres-entrypoint.sh:/usr/local/bin/solmara-postgres-entrypoint.sh:ro
      - ./config/postgres/ssl:/run/solmara-postgres-ssl:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  notary-postgresql-bootstrap:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: "no"
    entrypoint: ["/bin/sh", "/docker-entrypoint-initdb.d/010-init-notary-postgresql.sh"]
    environment:
      <<: *postgres-environment
      PGHOST: postgres
      PGPASSWORD: ${SOLMARA_POSTGRES_PASSWORD}
      PGSSLMODE: require
    volumes:
      - ./scripts/init-notary-postgresql.sh:/docker-entrypoint-initdb.d/010-init-notary-postgresql.sh:ro
    depends_on:
      postgres:
        condition: service_healthy

  static-metadata:
    image: ${STATIC_METADATA_IMAGE:-python:3.12-alpine}
    command: ["python", "-m", "http.server", "8080", "--bind", "0.0.0.0", "--directory", "/srv/static"]
    ports:
      - "${SOLMARA_METADATA_PORT:-4331}:8080"
    volumes:
      - ./metadata/public:/srv/static:ro

  scenario-runner:
    build:
      context: .
      dockerfile: scenario-runner/Dockerfile
    image: ${SOLMARA_SCENARIO_RUNNER_IMAGE:-solmara-lab-scenario-runner:local}
    environment:
      SCENARIO_RUNNER_HOST: 0.0.0.0
      SCENARIO_RUNNER_PORT: 8080
      SOLMARA_LAB_MODE: local
      CHILD_BENEFIT_FEDERATOR_URL: http://child-benefit-federator:8080
      CHILD_BENEFIT_FEDERATOR_TOKEN: ${CHILD_BENEFIT_FEDERATOR_TOKEN}
      PENSION_NOTARY_URL: http://pension-notary:8080
      PENSION_NOTARY_TOKEN: ${PENSION_NOTARY_TOKEN}
      NAGDI_NOTARY_URL: http://nagdi-notary:8080
      NAGDI_NOTARY_TOKEN: ${NAGDI_NOTARY_TOKEN}
      PORTAL_CITIZEN_NOTARY_URL: http://citizen-notary:8080
      PORTAL_CITIZEN_NOTARY_TOKEN: ${PORTAL_CITIZEN_NOTARY_TOKEN}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)\""]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      child-benefit-federator:
        condition: service_healthy
      pension-notary:
        condition: service_healthy
      nagdi-notary:
        condition: service_healthy
      citizen-notary:
        condition: service_healthy

  home:
    build:
      context: .
      dockerfile: home/Dockerfile
    image: ${SOLMARA_HOME_IMAGE:-solmara-lab-home:local}
    environment:
      HOST: 0.0.0.0
      PORT: 4301
      SOLMARA_LAB_ROOT: /app
      REPO_URL: ${REPO_URL:-https://github.com/registrystack/solmara-lab}
      PORTAL_URL: http://127.0.0.1:${SOLMARA_PORTAL_PORT:-4300}
      SCENARIO_RUNNER_URL: http://scenario-runner:8080
      STATIC_METADATA_URL: http://static-metadata:8080
      # Compose-internal probe URLs for the trust-strip status grid. The home
      # container is on the same network, so it can probe every service directly.
      PORTAL_PROBE_URL: http://portal:4000
      CRA_CIVIL_RELAY_URL: http://cra-civil-relay:8080
      NIA_POPULATION_RELAY_URL: http://nia-population-relay:8080
      SRO_SOCIAL_RELAY_URL: http://sro-social-relay:8080
      PROGRAMME_MIS_RELAY_URL: http://programme-mis-relay:8080
      SIPF_PENSIONS_RELAY_URL: http://sipf-pensions-relay:8080
      NAGDI_AGRICULTURE_RELAY_URL: http://nagdi-agriculture-relay:8080
      CHILD_BENEFIT_FEDERATOR_URL: http://child-benefit-federator:8080
      CIVIL_CHILD_BENEFIT_NOTARY_URL: http://civil-child-benefit-notary:8080
      NIA_CHILD_BENEFIT_NOTARY_URL: http://nia-child-benefit-notary:8080
      SRO_CHILD_BENEFIT_NOTARY_URL: http://sro-child-benefit-notary:8080
      PROGRAMME_CHILD_BENEFIT_NOTARY_URL: http://programme-child-benefit-notary:8080
      PENSION_NOTARY_URL: http://pension-notary:8080
      NAGDI_NOTARY_URL: http://nagdi-notary:8080
      PORTAL_CITIZEN_NOTARY_URL: http://citizen-notary:8080
      # Deliberate server-side allowlist of synthetic demo tokens the engineer
      # door publishes. Only names listed here are ever rendered; the values are
      # the same synthetic notary tokens the scenarios use. Never add a token
      # that is not meant to be public.
      HOME_PUBLISHED_TOKENS: >-
        {"child-benefit-federator":"${CHILD_BENEFIT_FEDERATOR_TOKEN}",
        "pension-notary":"${PENSION_NOTARY_TOKEN}",
        "nagdi-notary":"${NAGDI_NOTARY_TOKEN}",
        "citizen-notary":"${PORTAL_CITIZEN_NOTARY_TOKEN}"}
    ports:
      - "${SOLMARA_HOME_PORT:-4301}:4301"
    volumes:
      # Read-only mounts so the trust strip can read live smoke evidence written
      # by `just smoke` on the host and the generated data-seed manifest. The
      # image bakes a snapshot of the seed; these keep it current and expose the
      # smoke artifacts that the image cannot contain.
      - ./output/smoke:/app/output/smoke:ro
      - ./generator/output:/app/generator/output:ro
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4301/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      static-metadata:
        condition: service_started
      scenario-runner:
        condition: service_healthy

  cra-civil-relay:
    <<: *relay-common
    command: ["--config", "/etc/registry-relay/relay.yaml"]
    environment:
      <<: *relay-environment
      CRA_CHILD_BENEFIT_SOURCE_HASH: ${CRA_CHILD_BENEFIT_SOURCE_HASH}
      CRA_PENSION_SOURCE_HASH: ${CRA_PENSION_SOURCE_HASH}
      CRA_CITIZEN_SOURCE_HASH: ${CRA_CITIZEN_SOURCE_HASH}
      PORTAL_RELAY_TOKEN_HASH: ${PORTAL_RELAY_TOKEN_HASH}
    ports:
      - "${SOLMARA_CRA_RELAY_PORT:-4311}:8080"
    volumes:
      - ./ministries/interior-civil/config/relay.yaml:/etc/registry-relay/relay.yaml:ro
      - ./ministries/interior-civil:/var/lib/solmara/ministries/interior-civil:ro
      - cra-civil-cache:/var/lib/registry-relay/cache
      - cra-civil-audit:/var/lib/registry-relay/audit
    depends_on:
      volume-permissions:
        condition: service_completed_successfully

  nia-population-relay:
    <<: *relay-common
    command: ["--config", "/etc/registry-relay/relay.yaml"]
    environment:
      <<: *relay-environment
      SOLMARA_NIA_DATABASE_URL: ${SOLMARA_NIA_DATABASE_URL}
      DATA_GATE_POSTGRES_ROOT_CERT_PATH: /etc/solmara/postgres/root.crt
      NIA_CHILD_BENEFIT_SOURCE_HASH: ${NIA_CHILD_BENEFIT_SOURCE_HASH}
      NIA_PENSION_SOURCE_HASH: ${NIA_PENSION_SOURCE_HASH}
      NIA_CITIZEN_SOURCE_HASH: ${NIA_CITIZEN_SOURCE_HASH}
      SOLMARA_ESIGNET_IDENTITY_RELEASE_HASH: ${SOLMARA_ESIGNET_IDENTITY_RELEASE_HASH}
      PORTAL_RELAY_TOKEN_HASH: ${PORTAL_RELAY_TOKEN_HASH}
    ports:
      - "${SOLMARA_NIA_RELAY_PORT:-4312}:8080"
    volumes:
      - ./ministries/interior-population/config/relay.yaml:/etc/registry-relay/relay.yaml:ro
      - ./config/postgres/ssl/server.crt:/etc/solmara/postgres/root.crt:ro
      - nia-population-cache:/var/lib/registry-relay/cache
      - nia-population-audit:/var/lib/registry-relay/audit
    depends_on:
      volume-permissions:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  sro-social-relay:
    <<: *relay-common
    command: ["--config", "/etc/registry-relay/relay.yaml"]
    environment:
      <<: *relay-environment
      SRO_CHILD_BENEFIT_SOURCE_HASH: ${SRO_CHILD_BENEFIT_SOURCE_HASH}
      SRO_CITIZEN_SOURCE_HASH: ${SRO_CITIZEN_SOURCE_HASH}
      PORTAL_RELAY_TOKEN_HASH: ${PORTAL_RELAY_TOKEN_HASH}
    ports:
      - "${SOLMARA_SRO_RELAY_PORT:-4313}:8080"
    volumes:
      - ./ministries/social-development/config/sro-relay.yaml:/etc/registry-relay/relay.yaml:ro
      - ./ministries/social-development:/var/lib/solmara/ministries/social-development:ro
      - sro-social-cache:/var/lib/registry-relay/cache
      - sro-social-audit:/var/lib/registry-relay/audit
    depends_on:
      volume-permissions:
        condition: service_completed_successfully

  programme-mis-relay:
    <<: *relay-common
    command: ["--config", "/etc/registry-relay/relay.yaml"]
    environment:
      <<: *relay-environment
      PROGRAMME_CHILD_BENEFIT_SOURCE_HASH: ${PROGRAMME_CHILD_BENEFIT_SOURCE_HASH}
      PROGRAMME_PENSION_SOURCE_HASH: ${PROGRAMME_PENSION_SOURCE_HASH}
      PROGRAMME_CITIZEN_SOURCE_HASH: ${PROGRAMME_CITIZEN_SOURCE_HASH}
      PORTAL_RELAY_TOKEN_HASH: ${PORTAL_RELAY_TOKEN_HASH}
    ports:
      - "${SOLMARA_PROGRAMME_RELAY_PORT:-4314}:8080"
    volumes:
      - ./ministries/social-development/config/programme-mis-relay.yaml:/etc/registry-relay/relay.yaml:ro
      - ./ministries/social-development:/var/lib/solmara/ministries/social-development:ro
      - programme-mis-cache:/var/lib/registry-relay/cache
      - programme-mis-audit:/var/lib/registry-relay/audit
    depends_on:
      volume-permissions:
        condition: service_completed_successfully

  sipf-pensions-relay:
    <<: *relay-common
    command: ["--config", "/etc/registry-relay/relay.yaml"]
    environment:
      <<: *relay-environment
      SIPF_PENSION_SOURCE_HASH: ${SIPF_PENSION_SOURCE_HASH}
      SIPF_CITIZEN_SOURCE_HASH: ${SIPF_CITIZEN_SOURCE_HASH}
      PORTAL_RELAY_TOKEN_HASH: ${PORTAL_RELAY_TOKEN_HASH}
    ports:
      - "${SOLMARA_SIPF_RELAY_PORT:-4315}:8080"
    volumes:
      - ./ministries/labour-pensions/config/relay.yaml:/etc/registry-relay/relay.yaml:ro
      - ./ministries/labour-pensions:/var/lib/solmara/ministries/labour-pensions:ro
      - sipf-pensions-cache:/var/lib/registry-relay/cache
      - sipf-pensions-audit:/var/lib/registry-relay/audit
    depends_on:
      volume-permissions:
        condition: service_completed_successfully

  nagdi-agriculture-relay:
    <<: *relay-common
    command: ["--config", "/etc/registry-relay/relay.yaml"]
    environment:
      <<: *relay-environment
      NAGDI_NOTARY_SOURCE_HASH: ${NAGDI_NOTARY_SOURCE_HASH}
      NAGDI_CITIZEN_SOURCE_HASH: ${NAGDI_CITIZEN_SOURCE_HASH}
      PORTAL_RELAY_TOKEN_HASH: ${PORTAL_RELAY_TOKEN_HASH}
    ports:
      - "${SOLMARA_NAGDI_RELAY_PORT:-4316}:8080"
    volumes:
      - ./ministries/agriculture-nagdi/config/relay.yaml:/etc/registry-relay/relay.yaml:ro
      - ./ministries/agriculture-nagdi:/var/lib/solmara/ministries/agriculture-nagdi:ro
      - nagdi-agriculture-cache:/var/lib/registry-relay/cache
      - nagdi-agriculture-audit:/var/lib/registry-relay/audit
    depends_on:
      volume-permissions:
        condition: service_completed_successfully

  civil-child-benefit-notary:
    <<: *notary-common
    command: ["--config", "/etc/registry-notary/child-benefit-civil.yaml"]
    environment: &civil-child-benefit-notary-environment
      <<: *notary-environment
      REGISTRY_NOTARY_POSTGRES_URL: "postgresql://solmara_notary_civil_child_benefit_runtime:${CIVIL_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD}@postgres:5432/solmara_notary_civil_child_benefit?sslmode=require"
      CIVIL_CHILD_BENEFIT_CLIENT_TOKEN_HASH: ${CIVIL_CHILD_BENEFIT_CLIENT_TOKEN_HASH}
      CRA_CHILD_BENEFIT_SOURCE_RAW: ${CRA_CHILD_BENEFIT_SOURCE_RAW}
      CIVIL_CHILD_BENEFIT_FEDERATION_RESPONSE_JWK: ${CIVIL_CHILD_BENEFIT_FEDERATION_RESPONSE_JWK}
      CIVIL_CHILD_BENEFIT_PAIRWISE_SECRET: ${CIVIL_CHILD_BENEFIT_PAIRWISE_SECRET}
    ports:
      - "${SOLMARA_CIVIL_CHILD_BENEFIT_NOTARY_PORT:-4325}:8080"
    volumes:
      - ./notaries/child-benefit-civil.yaml:/etc/registry-notary/child-benefit-civil.yaml:ro
      - ./config/postgres/ssl/server.crt:/etc/solmara/postgres/root.crt:ro
      - civil-child-benefit-notary-state:/var/lib/registry-notary/config-state
    depends_on:
      cra-civil-relay:
        condition: service_started
      civil-child-benefit-notary-state-install:
        condition: service_completed_successfully

  civil-child-benefit-notary-state-install:
    image: ${REGISTRY_NOTARY_IMAGE:-ghcr.io/registrystack/registry-notary@sha256:0cf05184885d7ed17dd9889e20f3797eb2a9ad07517f4ac7c05c03b774a00b8f}
    platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
    restart: "no"
    command: ["--config", "/etc/registry-notary/child-benefit-civil.yaml", "state", "install", "--migration-url-env", "REGISTRY_NOTARY_POSTGRES_MIGRATOR_URL", "--owner-role", "solmara_notary_civil_child_benefit_owner", "--runtime-role", "solmara_notary_civil_child_benefit_runtime"]
    environment:
      <<: *civil-child-benefit-notary-environment
      REGISTRY_NOTARY_POSTGRES_MIGRATOR_URL: "postgresql://solmara_notary_civil_child_benefit_migrator:${CIVIL_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD}@postgres:5432/solmara_notary_civil_child_benefit?sslmode=require"
    volumes:
      - ./notaries/child-benefit-civil.yaml:/etc/registry-notary/child-benefit-civil.yaml:ro
      - ./config/postgres/ssl/server.crt:/etc/solmara/postgres/root.crt:ro
    depends_on:
      notary-postgresql-bootstrap:
        condition: service_completed_successfully

  nia-child-benefit-notary:
    <<: *notary-common
    command: ["--config", "/etc/registry-notary/child-benefit-population.yaml"]
    environment: &nia-child-benefit-notary-environment
      <<: *notary-environment
      REGISTRY_NOTARY_POSTGRES_URL: "postgresql://solmara_notary_nia_child_benefit_runtime:${NIA_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD}@postgres:5432/solmara_notary_nia_child_benefit?sslmode=require"
      NIA_CHILD_BENEFIT_CLIENT_TOKEN_HASH: ${NIA_CHILD_BENEFIT_CLIENT_TOKEN_HASH}
      NIA_CHILD_BENEFIT_SOURCE_RAW: ${NIA_CHILD_BENEFIT_SOURCE_RAW}
      NIA_CHILD_BENEFIT_FEDERATION_RESPONSE_JWK: ${NIA_CHILD_BENEFIT_FEDERATION_RESPONSE_JWK}
      NIA_CHILD_BENEFIT_PAIRWISE_SECRET: ${NIA_CHILD_BENEFIT_PAIRWISE_SECRET}
    ports:
      - "${SOLMARA_NIA_CHILD_BENEFIT_NOTARY_PORT:-4326}:8080"
    volumes:
      - ./notaries/child-benefit-population.yaml:/etc/registry-notary/child-benefit-population.yaml:ro
      - ./config/postgres/ssl/server.crt:/etc/solmara/postgres/root.crt:ro
      - nia-child-benefit-notary-state:/var/lib/registry-notary/config-state
    depends_on:
      nia-population-relay:
        condition: service_started
      nia-child-benefit-notary-state-install:
        condition: service_completed_successfully

  nia-child-benefit-notary-state-install:
