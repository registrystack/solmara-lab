      REGISTRY_NOTARY_POSTGRES_URL: "postgresql://solmara_notary_sro_runtime:${SRO_NOTARY_POSTGRES_RUNTIME_PASSWORD}@postgres:5432/solmara_notary_sro?sslmode=require"
      SRO_CHILD_BENEFIT_CLIENT_TOKEN_HASH: ${SRO_CHILD_BENEFIT_CLIENT_TOKEN_HASH}
    volumes:
      - ./runtime/registry-projects/local/sro-social/notary/notary.yaml:/etc/registry-notary/notary.yaml:ro
      - ./config/postgres/ssl/server.crt:/etc/solmara/postgres/root.crt:ro
      - sro-workload-token:/run/secrets:ro
    depends_on:
      sro-social-relay:
        condition: service_healthy
      sro-workload-agent:
        condition: service_healthy
      sro-notary-state-install:
        condition: service_completed_successfully

