        condition: service_healthy

  child-benefit-federator:
    build:
      context: .
      dockerfile: scenario-runner/Dockerfile
    image: ${SOLMARA_CHILD_BENEFIT_FEDERATOR_IMAGE:-solmara-lab-scenario-runner:local}
    command: ["python", "scenario-runner/child_benefit_federator.py"]
    environment:
      CHILD_BENEFIT_FEDERATOR_HOST: 0.0.0.0
      CHILD_BENEFIT_FEDERATOR_PORT: 8080
      CHILD_BENEFIT_FEDERATOR_TOKEN: ${CHILD_BENEFIT_FEDERATOR_TOKEN}
      CRA_NOTARY_URL: http://cra-notary:8081
      CRA_CHILD_BENEFIT_CLIENT_TOKEN: ${CRA_CHILD_BENEFIT_CLIENT_TOKEN}
      NIA_NOTARY_URL: http://nia-notary:8081
      NIA_CHILD_BENEFIT_CLIENT_TOKEN: ${NIA_CHILD_BENEFIT_CLIENT_TOKEN}
      SRO_NOTARY_URL: http://sro-notary:8081
      SRO_CHILD_BENEFIT_CLIENT_TOKEN: ${SRO_CHILD_BENEFIT_CLIENT_TOKEN}
      PROGRAMME_NOTARY_URL: http://programme-notary:8081
      PROGRAMME_CHILD_BENEFIT_CLIENT_TOKEN: ${PROGRAMME_CHILD_BENEFIT_CLIENT_TOKEN}
    ports:
      - "${SOLMARA_CHILD_BENEFIT_FEDERATOR_PORT:-4321}:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)\""]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      cra-notary:
        condition: service_healthy
      nia-notary:
        condition: service_healthy
      sro-notary:
        condition: service_healthy
      programme-notary:
        condition: service_healthy

