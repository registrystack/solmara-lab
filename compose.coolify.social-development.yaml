name: solmara-lab-social-development

x-relay-environment: &relay-environment
  RUST_LOG: ${RUST_LOG:-info}
  REGISTRY_RELAY_AUDIT_HASH_SECRET: ${REGISTRY_RELAY_AUDIT_HASH_SECRET:?set REGISTRY_RELAY_AUDIT_HASH_SECRET}

x-notary-environment: &notary-environment
  RUST_LOG: ${RUST_LOG:-info}
  REGISTRY_NOTARY_AUDIT_HASH_SECRET: ${REGISTRY_NOTARY_AUDIT_HASH_SECRET:?set REGISTRY_NOTARY_AUDIT_HASH_SECRET}
  REGISTRY_NOTARY_POSTGRES_ROOT_CERT_PATH: /etc/solmara/postgres/root.crt

x-relay-common: &relay-common
  image: ${SOLMARA_RELAY_IMAGE:?set digest-pinned Solmara relay image}
  platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
  restart: unless-stopped
  environment: *relay-environment
  depends_on:
    volume-permissions:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "/usr/local/bin/registry-relay", "healthcheck"]
    interval: 30s
    timeout: 10s
    retries: 3

x-notary-common: &notary-common
  image: ${SOLMARA_NOTARY_IMAGE:?set digest-pinned Solmara notary image}
  platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
  restart: unless-stopped
  environment: *notary-environment
  healthcheck:
    test: ["CMD", "/usr/local/bin/registry-notary", "healthcheck"]
    interval: 30s
    timeout: 10s
    retries: 3
  depends_on:
    volume-permissions:
      condition: service_healthy

services:
  volume-permissions:
    image: ${VOLUME_INIT_IMAGE:-busybox:1.36}
    restart: unless-stopped
    command:
      - sh
      - -c
      - chown -R 65532:65532 /relay/* && chown -R 65534:65534 /notary/* && touch /tmp/ready && tail -f /dev/null
    volumes:
      - sro-social-cache:/relay/sro-social-cache
      - sro-social-audit:/relay/sro-social-audit
      - programme-mis-cache:/relay/programme-mis-cache
      - programme-mis-audit:/relay/programme-mis-audit
      - sro-child-benefit-notary-state:/notary/sro-child-benefit-notary-state
      - programme-child-benefit-notary-state:/notary/programme-child-benefit-notary-state
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/ready"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: ${SOLMARA_POSTGRES_IMAGE:?set digest-pinned Solmara Postgres image}
    entrypoint: ["/bin/sh", "/usr/local/bin/solmara-postgres-entrypoint.sh"]
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/var/lib/postgresql/server-ssl/server.crt
      - -c
      - ssl_key_file=/var/lib/postgresql/server-ssl/server.key
    environment: &postgres-environment
      POSTGRES_USER: ${SOLMARA_POSTGRES_USER:-solmara_registry}
      POSTGRES_PASSWORD: ${SOLMARA_POSTGRES_PASSWORD}
      POSTGRES_DB: ${SOLMARA_POSTGRES_DB:-solmara_lab}
      SOLMARA_NOTARY_DATABASES: sro_child_benefit programme_child_benefit
      SRO_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD: ${SRO_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD}
      SRO_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD: ${SRO_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD}
      PROGRAMME_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD: ${PROGRAMME_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD}
      PROGRAMME_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD: ${PROGRAMME_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  notary-postgresql-bootstrap:
    image: ${SOLMARA_POSTGRES_IMAGE:?set digest-pinned Solmara Postgres image}
    restart: "no"
    entrypoint: ["/bin/sh", "/docker-entrypoint-initdb.d/010-init-notary-postgresql.sh"]
    environment:
      <<: *postgres-environment
      PGHOST: postgres
      PGPASSWORD: ${SOLMARA_POSTGRES_PASSWORD}
      PGSSLMODE: require
    depends_on:
      postgres:
        condition: service_healthy

  sro-social-relay:
    <<: *relay-common
    command: ["--config", "/var/lib/solmara/ministries/social-development/config/sro-relay.yaml"]
    environment:
      <<: *relay-environment
      SRO_CHILD_BENEFIT_SOURCE_HASH: ${SRO_CHILD_BENEFIT_SOURCE_HASH}
      SRO_CITIZEN_SOURCE_HASH: ${SRO_CITIZEN_SOURCE_HASH}
      PORTAL_RELAY_TOKEN_HASH: ${PORTAL_RELAY_TOKEN_HASH}
    volumes:
      - sro-social-cache:/var/lib/registry-relay/cache
      - sro-social-audit:/var/lib/registry-relay/audit
    labels:
      solmara.lab.host: sro-relay.solmara.registrystack.org

  programme-mis-relay:
    <<: *relay-common
    command: ["--config", "/var/lib/solmara/ministries/social-development/config/programme-mis-relay.yaml"]
    environment:
      <<: *relay-environment
      PROGRAMME_CHILD_BENEFIT_SOURCE_HASH: ${PROGRAMME_CHILD_BENEFIT_SOURCE_HASH}
      PROGRAMME_PENSION_SOURCE_HASH: ${PROGRAMME_PENSION_SOURCE_HASH}
      PROGRAMME_CITIZEN_SOURCE_HASH: ${PROGRAMME_CITIZEN_SOURCE_HASH}
      PORTAL_RELAY_TOKEN_HASH: ${PORTAL_RELAY_TOKEN_HASH}
    volumes:
      - programme-mis-cache:/var/lib/registry-relay/cache
      - programme-mis-audit:/var/lib/registry-relay/audit
    labels:
      solmara.lab.host: mosd-programme-relay.solmara.registrystack.org

  sro-child-benefit-notary:
    <<: *notary-common
    command: ["--config", "/etc/registry-notary/child-benefit-social.yaml"]
    environment: &sro-child-benefit-notary-environment
      <<: *notary-environment
      REGISTRY_NOTARY_POSTGRES_URL: "postgresql://solmara_notary_sro_child_benefit_runtime:${SRO_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD}@postgres:5432/solmara_notary_sro_child_benefit?sslmode=require"
      SRO_CHILD_BENEFIT_CLIENT_TOKEN_HASH: ${SRO_CHILD_BENEFIT_CLIENT_TOKEN_HASH}
      SRO_CHILD_BENEFIT_SOURCE_RAW: ${SRO_CHILD_BENEFIT_SOURCE_RAW}
      SRO_CHILD_BENEFIT_FEDERATION_RESPONSE_JWK: ${SRO_CHILD_BENEFIT_FEDERATION_RESPONSE_JWK}
      SRO_CHILD_BENEFIT_PAIRWISE_SECRET: ${SRO_CHILD_BENEFIT_PAIRWISE_SECRET}
    volumes:
      - sro-child-benefit-notary-state:/var/lib/registry-notary/config-state
    depends_on:
      volume-permissions:
        condition: service_healthy
      sro-social-relay:
        condition: service_healthy
      sro-child-benefit-notary-state-install:
        condition: service_completed_successfully
    labels:
      solmara.lab.host: sro-child-benefit-notary.solmara.registrystack.org

  sro-child-benefit-notary-state-install:
    image: ${SOLMARA_NOTARY_IMAGE:?set digest-pinned Solmara notary image}
    platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
    restart: "no"
    command: ["--config", "/etc/registry-notary/child-benefit-social.yaml", "state", "install", "--migration-url-env", "REGISTRY_NOTARY_POSTGRES_MIGRATOR_URL", "--owner-role", "solmara_notary_sro_child_benefit_owner", "--runtime-role", "solmara_notary_sro_child_benefit_runtime"]
    environment:
      <<: *sro-child-benefit-notary-environment
      REGISTRY_NOTARY_POSTGRES_MIGRATOR_URL: "postgresql://solmara_notary_sro_child_benefit_migrator:${SRO_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD}@postgres:5432/solmara_notary_sro_child_benefit?sslmode=require"
    depends_on:
      notary-postgresql-bootstrap:
        condition: service_completed_successfully

  programme-child-benefit-notary:
    <<: *notary-common
    command: ["--config", "/etc/registry-notary/child-benefit-programme.yaml"]
    environment: &programme-child-benefit-notary-environment
      <<: *notary-environment
      REGISTRY_NOTARY_POSTGRES_URL: "postgresql://solmara_notary_programme_child_benefit_runtime:${PROGRAMME_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD}@postgres:5432/solmara_notary_programme_child_benefit?sslmode=require"
      PROGRAMME_CHILD_BENEFIT_CLIENT_TOKEN_HASH: ${PROGRAMME_CHILD_BENEFIT_CLIENT_TOKEN_HASH}
      PROGRAMME_CHILD_BENEFIT_SOURCE_RAW: ${PROGRAMME_CHILD_BENEFIT_SOURCE_RAW}
      PROGRAMME_CHILD_BENEFIT_FEDERATION_RESPONSE_JWK: ${PROGRAMME_CHILD_BENEFIT_FEDERATION_RESPONSE_JWK}
      PROGRAMME_CHILD_BENEFIT_PAIRWISE_SECRET: ${PROGRAMME_CHILD_BENEFIT_PAIRWISE_SECRET}
    volumes:
      - programme-child-benefit-notary-state:/var/lib/registry-notary/config-state
    depends_on:
      volume-permissions:
        condition: service_healthy
      programme-mis-relay:
        condition: service_healthy
      programme-child-benefit-notary-state-install:
        condition: service_completed_successfully
    labels:
      solmara.lab.host: programme-child-benefit-notary.solmara.registrystack.org

  programme-child-benefit-notary-state-install:
    image: ${SOLMARA_NOTARY_IMAGE:?set digest-pinned Solmara notary image}
    platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
    restart: "no"
    command: ["--config", "/etc/registry-notary/child-benefit-programme.yaml", "state", "install", "--migration-url-env", "REGISTRY_NOTARY_POSTGRES_MIGRATOR_URL", "--owner-role", "solmara_notary_programme_child_benefit_owner", "--runtime-role", "solmara_notary_programme_child_benefit_runtime"]
    environment:
      <<: *programme-child-benefit-notary-environment
      REGISTRY_NOTARY_POSTGRES_MIGRATOR_URL: "postgresql://solmara_notary_programme_child_benefit_migrator:${PROGRAMME_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD}@postgres:5432/solmara_notary_programme_child_benefit?sslmode=require"
    depends_on:
      notary-postgresql-bootstrap:
        condition: service_completed_successfully

volumes:
  postgres-data:
  sro-social-cache:
  sro-social-audit:
  programme-mis-cache:
  programme-mis-audit:
  sro-child-benefit-notary-state:
  programme-child-benefit-notary-state:
