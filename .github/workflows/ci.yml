name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Enable pnpm
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: portal/pnpm-lock.yaml
      - name: Install just
        uses: extractions/setup-just@v2
      - name: Setup
        run: just setup
      - name: Publish metadata
        run: just metadata-publish
      - name: Lint
        run: just lint
      - name: Test
        run: just test
      - name: Verify compiler-generated authority projects
        run: |
          just registry-projects-check
          just registry-projects-test
          just registry-projects-runtime-check
      - name: Generate local secrets
        run: just gen-secrets
      - name: Compose
        run: just compose
      - name: Review
        run: just review
