name: release-candidate

on:
  workflow_dispatch:
    inputs:
      registry_relay_image:
        description: Digest-pinned registry-relay image
        required: true
      registry_notary_image:
        description: Digest-pinned registry-notary image
        required: true
      solmara_image_tag:
        description: Tag for Solmara-owned images. Defaults to the workflow commit SHA.
        required: false

permissions:
  contents: read
  packages: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      REGISTRY_RELAY_IMAGE: ${{ inputs.registry_relay_image }}
      REGISTRY_NOTARY_IMAGE: ${{ inputs.registry_notary_image }}
      SOLMARA_IMAGE_REGISTRY: ghcr.io/registrystack
      SOLMARA_IMAGE_TAG: ${{ inputs.solmara_image_tag || github.sha }}
      POSTGRES_IMAGE: postgres:16-alpine
      ESIGNET_POSTGRES_IMAGE: postgres:16
      ESIGNET_BASE_IMAGE: mosipid/esignet-with-plugins:1.8.0
      ESIGNET_UI_IMAGE: mosipid/oidc-ui:1.8.0
      ESIGNET_RELAY_AUTHENTICATOR_REF: 9c066ae897cd3966333d7d75fc77db2e6dc7342c
      STATIC_METADATA_IMAGE: python:3.12-alpine
    steps:
      - uses: actions/checkout@v4
      - name: Checkout eSignet relay authenticator
        uses: actions/checkout@v4
        with:
          repository: jeremi/esignet-relay-authenticator
          ref: ${{ env.ESIGNET_RELAY_AUTHENTICATOR_REF }}
          path: vendor/esignet-relay-authenticator
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: docker/setup-buildx-action@v3
      - name: Install tools
        run: |
          corepack enable
          sudo apt-get update
          sudo apt-get install -y just
      - name: Setup
        run: just setup
      - name: Install Playwright browser
        run: |
          cd portal && pnpm exec playwright install --with-deps chromium
          cd ../home && pnpm exec playwright install chromium
      - name: Generate fixtures and secrets
        run: |
          just generate
          just metadata-publish
      - name: Validate
        run: |
          just release-pins v0.8.4
          just lint
          just test
          just compose
      - name: Start stack
        run: just up
      - name: Smoke
        run: just smoke
      - name: Portal live e2e
        run: just portal-live-e2e
      - name: Visitor center e2e
        run: just home-live-e2e
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push hosted Relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/relay/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.SOLMARA_IMAGE_REGISTRY }}/solmara-lab-relay:${{ env.SOLMARA_IMAGE_TAG }}
          build-args: |
            REGISTRY_RELAY_IMAGE=${{ env.REGISTRY_RELAY_IMAGE }}
      - name: Build and push hosted Notary image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/notary/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.SOLMARA_IMAGE_REGISTRY }}/solmara-lab-notary:${{ env.SOLMARA_IMAGE_TAG }}
          build-args: |
            REGISTRY_NOTARY_IMAGE=${{ env.REGISTRY_NOTARY_IMAGE }}
      - name: Build and push hosted Postgres image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/postgres/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.SOLMARA_IMAGE_REGISTRY }}/solmara-lab-postgres:${{ env.SOLMARA_IMAGE_TAG }}
          build-args: |
            POSTGRES_IMAGE=${{ env.POSTGRES_IMAGE }}
      - name: Build and push hosted static metadata image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/static-metadata/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.SOLMARA_IMAGE_REGISTRY }}/solmara-lab-static-metadata:${{ env.SOLMARA_IMAGE_TAG }}
          build-args: |
            STATIC_METADATA_IMAGE=${{ env.STATIC_METADATA_IMAGE }}
      - name: Build and push scenario runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scenario-runner/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.SOLMARA_IMAGE_REGISTRY }}/solmara-lab-scenario-runner:${{ env.SOLMARA_IMAGE_TAG }}
      - name: Build and push Visitor Center image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: home/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.SOLMARA_IMAGE_REGISTRY }}/solmara-lab-home:${{ env.SOLMARA_IMAGE_TAG }}
      - name: Build and push portal image
        uses: docker/build-push-action@v6
        with:
          context: ./portal
          file: ./portal/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.SOLMARA_IMAGE_REGISTRY }}/solmara-lab-portal:${{ env.SOLMARA_IMAGE_TAG }}
      - name: Build and push eSignet relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/esignet-relay/Dockerfile
          build-contexts: |
            esignet_relay_authenticator_src=./vendor/esignet-relay-authenticator
          platforms: linux/amd64
          push: true
          tags: ${{ env.SOLMARA_IMAGE_REGISTRY }}/solmara-lab-esignet-relay:${{ env.SOLMARA_IMAGE_TAG }}
          build-args: |
            ESIGNET_BASE_IMAGE=${{ env.ESIGNET_BASE_IMAGE }}
      - name: Build and push eSignet Postgres image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/esignet-postgres/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.SOLMARA_IMAGE_REGISTRY }}/solmara-lab-esignet-postgres:${{ env.SOLMARA_IMAGE_TAG }}
          build-args: |
            POSTGRES_IMAGE=${{ env.ESIGNET_POSTGRES_IMAGE }}
      - name: Build and push eSignet UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/esignet-ui/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.SOLMARA_IMAGE_REGISTRY }}/solmara-lab-esignet-ui:${{ env.SOLMARA_IMAGE_TAG }}
          build-args: |
            ESIGNET_UI_IMAGE=${{ env.ESIGNET_UI_IMAGE }}
            ESIGNET_NGINX_CONF=config/esignet/nginx-hosted.conf
      - name: Build and push eSignet seed image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/esignet-seed/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.SOLMARA_IMAGE_REGISTRY }}/solmara-lab-esignet-seed:${{ env.SOLMARA_IMAGE_TAG }}
      - name: Report image digests
        run: |
          {
            echo "### Solmara image digests"
            echo
            for image in solmara-lab-relay solmara-lab-notary solmara-lab-postgres solmara-lab-static-metadata solmara-lab-scenario-runner solmara-lab-home solmara-lab-portal solmara-lab-esignet-relay solmara-lab-esignet-postgres solmara-lab-esignet-ui solmara-lab-esignet-seed; do
              ref="${SOLMARA_IMAGE_REGISTRY}/${image}:${SOLMARA_IMAGE_TAG}"
              digest="$(docker buildx imagetools inspect "$ref" --format '{{.Manifest.Digest}}')"
              echo "- ${SOLMARA_IMAGE_REGISTRY}/${image}@${digest}"
            done
          } | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Stop stack
        if: always()
        run: just down
