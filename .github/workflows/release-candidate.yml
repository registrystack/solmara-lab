name: release-candidate

on:
  workflow_dispatch:
    inputs:
      registry_relay_image:
        description: Digest-pinned registry-relay image
        required: true
      registry_notary_image:
        description: Digest-pinned registry-notary image
        required: true
      solmara_image_tag:
        description: Tag for Solmara-owned images. Defaults to the workflow commit SHA.
        required: false

permissions:
  contents: read
  packages: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      REGISTRY_RELAY_IMAGE: ${{ inputs.registry_relay_image }}
      REGISTRY_NOTARY_IMAGE: ${{ inputs.registry_notary_image }}
      SOLMARA_IMAGE_REGISTRY: ghcr.io/registrystack
      SOLMARA_IMAGE_TAG: ${{ inputs.solmara_image_tag || github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: docker/setup-buildx-action@v3
      - name: Install tools
        run: |
          corepack enable
          sudo apt-get update
          sudo apt-get install -y just
      - name: Setup
        run: just setup
      - name: Install Playwright browser
        run: |
          cd portal && pnpm exec playwright install --with-deps chromium
          cd ../home && pnpm exec playwright install chromium
      - name: Generate fixtures and secrets
        run: |
          just generate
          just metadata-publish
      - name: Validate
        run: |
          just release-pins v0.8.4
          just lint
          just test
          just compose
      - name: Start stack
        run: just up
      - name: Smoke
        run: just smoke
      - name: Portal live e2e
        run: just portal-live-e2e
      - name: Visitor center e2e
        run: just home-live-e2e
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push scenario runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scenario-runner/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.SOLMARA_IMAGE_REGISTRY }}/solmara-lab-scenario-runner:${{ env.SOLMARA_IMAGE_TAG }}
      - name: Build and push Visitor Center image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: home/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.SOLMARA_IMAGE_REGISTRY }}/solmara-lab-home:${{ env.SOLMARA_IMAGE_TAG }}
      - name: Build and push portal image
        uses: docker/build-push-action@v6
        with:
          context: ./portal
          file: ./portal/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.SOLMARA_IMAGE_REGISTRY }}/solmara-lab-portal:${{ env.SOLMARA_IMAGE_TAG }}
      - name: Report image digests
        run: |
          {
            echo "### Solmara image digests"
            echo
            for image in solmara-lab-scenario-runner solmara-lab-home solmara-lab-portal; do
              ref="${SOLMARA_IMAGE_REGISTRY}/${image}:${SOLMARA_IMAGE_TAG}"
              digest="$(docker buildx imagetools inspect "$ref" --format '{{.Manifest.Digest}}')"
              echo "- ${SOLMARA_IMAGE_REGISTRY}/${image}@${digest}"
            done
          } | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Stop stack
        if: always()
        run: just down
