name: solmara-lab

# Standalone Coolify compose. Keep this free of Docker Compose extension tags;
# Coolify's API parser reads this file before it can store per-service domains.
services:
  child-benefit-notary:
    command:
      - --config
      - /etc/registry-notary/child-benefit.yaml
    depends_on:
      cra-civil-relay:
        condition: service_started
        required: true
      nia-population-relay:
        condition: service_started
        required: true
      programme-mis-relay:
        condition: service_started
        required: true
      redis:
        condition: service_healthy
        required: true
      sro-social-relay:
        condition: service_started
        required: true
    environment:
      CHILD_BENEFIT_CLIENT_TOKEN_HASH: ${CHILD_BENEFIT_CLIENT_TOKEN_HASH}
      CHILD_BENEFIT_NOTARY_ISSUER_JWK: ${CHILD_BENEFIT_NOTARY_ISSUER_JWK}
      CRA_CHILD_BENEFIT_SOURCE_RAW: ${CRA_CHILD_BENEFIT_SOURCE_RAW}
      NIA_CHILD_BENEFIT_SOURCE_RAW: ${NIA_CHILD_BENEFIT_SOURCE_RAW}
      PROGRAMME_CHILD_BENEFIT_SOURCE_RAW: ${PROGRAMME_CHILD_BENEFIT_SOURCE_RAW}
      REGISTRY_NOTARY_AUDIT_HASH_SECRET: ${REGISTRY_NOTARY_AUDIT_HASH_SECRET:?.env not loaded; run just gen-secrets once, then just up}
      REGISTRY_NOTARY_REDIS_URL: redis://redis:6379/
      REGISTRY_NOTARY_REPLAY_REDIS_URL: ${REGISTRY_NOTARY_REPLAY_REDIS_URL:-redis://redis:6379/0}
      REGISTRY_PLATFORM_REDIS_TEST_URL: redis://redis:6379/
      RUST_LOG: ${RUST_LOG:-info}
      SRO_CHILD_BENEFIT_SOURCE_RAW: ${SRO_CHILD_BENEFIT_SOURCE_RAW}
    healthcheck:
      interval: 30s
      retries: 3
      test:
        - CMD
        - /usr/local/bin/registry-notary
        - healthcheck
      timeout: 10s
    image: ${REGISTRY_NOTARY_IMAGE:-ghcr.io/registrystack/registry-notary@sha256:0cf05184885d7ed17dd9889e20f3797eb2a9ad07517f4ac7c05c03b774a00b8f}
    labels:
      solmara.lab.host: child-benefit-notary.solmara.registrystack.org
    platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
    restart: unless-stopped
    volumes:
      - bind:
          create_host_path: true
        read_only: true
        source: ./notaries/child-benefit.yaml
        target: /etc/registry-notary/child-benefit.yaml
        type: bind
      - source: child-benefit-notary-state
        target: /var/lib/registry-notary/config-state
        type: volume
        volume: {}
  citizen-notary:
    command:
      - --config
      - /etc/registry-notary/citizen.yaml
    depends_on:
      cra-civil-relay:
        condition: service_started
        required: true
      nagdi-agriculture-relay:
        condition: service_started
        required: true
      nia-population-relay:
        condition: service_started
        required: true
      programme-mis-relay:
        condition: service_started
        required: true
      redis:
        condition: service_healthy
        required: true
      sipf-pensions-relay:
        condition: service_started
        required: true
      sro-social-relay:
        condition: service_started
        required: true
    environment:
      CITIZEN_NOTARY_ISSUER_JWK: ${CITIZEN_NOTARY_ISSUER_JWK}
      CITIZEN_PORTAL_BFF_TOKEN_HASH: ${CITIZEN_PORTAL_BFF_TOKEN_HASH}
      CRA_CITIZEN_SOURCE_RAW: ${CRA_CITIZEN_SOURCE_RAW}
      NAGDI_CITIZEN_SOURCE_RAW: ${NAGDI_CITIZEN_SOURCE_RAW}
      NIA_CITIZEN_SOURCE_RAW: ${NIA_CITIZEN_SOURCE_RAW}
      PROGRAMME_CITIZEN_SOURCE_RAW: ${PROGRAMME_CITIZEN_SOURCE_RAW}
      REGISTRY_NOTARY_AUDIT_HASH_SECRET: ${REGISTRY_NOTARY_AUDIT_HASH_SECRET:?.env not loaded; run just gen-secrets once, then just up}
      REGISTRY_NOTARY_REDIS_URL: redis://redis:6379/
      REGISTRY_NOTARY_REPLAY_REDIS_URL: ${REGISTRY_NOTARY_REPLAY_REDIS_URL:-redis://redis:6379/0}
      REGISTRY_PLATFORM_REDIS_TEST_URL: redis://redis:6379/
      RUST_LOG: ${RUST_LOG:-info}
      SIPF_CITIZEN_SOURCE_RAW: ${SIPF_CITIZEN_SOURCE_RAW}
      SRO_CITIZEN_SOURCE_RAW: ${SRO_CITIZEN_SOURCE_RAW}
    healthcheck:
      interval: 30s
      retries: 3
      test:
        - CMD
        - /usr/local/bin/registry-notary
        - healthcheck
      timeout: 10s
    image: ${REGISTRY_NOTARY_IMAGE:-ghcr.io/registrystack/registry-notary@sha256:0cf05184885d7ed17dd9889e20f3797eb2a9ad07517f4ac7c05c03b774a00b8f}
    labels:
      solmara.lab.host: citizen-notary.solmara.registrystack.org
    platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
    restart: unless-stopped
    volumes:
      - bind:
          create_host_path: true
        read_only: true
        source: ./notaries/citizen.yaml
        target: /etc/registry-notary/citizen.yaml
        type: bind
      - source: citizen-notary-state
        target: /var/lib/registry-notary/config-state
        type: volume
        volume: {}
  cra-civil-relay:
    command:
      - --config
      - /etc/registry-relay/relay.yaml
    depends_on:
      volume-permissions:
        condition: service_completed_successfully
        required: true
    environment:
      CRA_CHILD_BENEFIT_SOURCE_HASH: ${CRA_CHILD_BENEFIT_SOURCE_HASH}
      CRA_CITIZEN_SOURCE_HASH: ${CRA_CITIZEN_SOURCE_HASH}
      CRA_PENSION_SOURCE_HASH: ${CRA_PENSION_SOURCE_HASH}
      PORTAL_RELAY_TOKEN_HASH: ${PORTAL_RELAY_TOKEN_HASH}
      REGISTRY_RELAY_AUDIT_HASH_SECRET: ${REGISTRY_RELAY_AUDIT_HASH_SECRET:?.env not loaded; run just gen-secrets once, then just up}
      RUST_LOG: ${RUST_LOG:-info}
    healthcheck:
      interval: 30s
      retries: 3
      test:
        - CMD
        - /usr/local/bin/registry-relay
        - healthcheck
      timeout: 10s
    image: ${REGISTRY_RELAY_IMAGE:-ghcr.io/registrystack/registry-relay@sha256:93e194500a3500ba3f6331d5a0a9a3069127c48a709beccb083a5fcbdbc3ec61}
    labels:
      solmara.lab.host: cra-relay.solmara.registrystack.org
    platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
    restart: unless-stopped
    volumes:
      - bind:
          create_host_path: true
        read_only: true
        source: ./ministries/interior-civil/config/relay.yaml
        target: /etc/registry-relay/relay.yaml
        type: bind
      - bind:
          create_host_path: true
        read_only: true
        source: ./ministries/interior-civil
        target: /var/lib/solmara/ministries/interior-civil
        type: bind
      - source: cra-civil-cache
        target: /var/lib/registry-relay/cache
        type: volume
        volume: {}
      - source: cra-civil-audit
        target: /var/lib/registry-relay/audit
        type: volume
        volume: {}
  home:
    depends_on:
      scenario-runner:
        condition: service_healthy
        required: true
      static-metadata:
        condition: service_started
        required: true
    environment:
      - CHILD_BENEFIT_NOTARY_URL=http://child-benefit-notary:8080
      - CRA_CIVIL_RELAY_URL=http://cra-civil-relay:8080
      - HOME_PUBLISHED_TOKENS={"child-benefit-notary":"${CHILD_BENEFIT_NOTARY_TOKEN}", "pension-notary":"${PENSION_NOTARY_TOKEN}", "nagdi-notary":"${NAGDI_NOTARY_TOKEN}", "citizen-notary":"${PORTAL_CITIZEN_NOTARY_TOKEN}"}
      - HOST=0.0.0.0
      - NAGDI_AGRICULTURE_RELAY_URL=http://nagdi-agriculture-relay:8080
      - NAGDI_NOTARY_URL=http://nagdi-notary:8080
      - NIA_POPULATION_RELAY_URL=http://nia-population-relay:8080
      - PENSION_NOTARY_URL=http://pension-notary:8080
      - PORT=4301
      - PORTAL_CITIZEN_NOTARY_URL=http://citizen-notary:8080
      - PORTAL_PROBE_URL=http://portal:4000
      - PORTAL_URL=https://portal.solmara.registrystack.org
      - PROGRAMME_MIS_RELAY_URL=http://programme-mis-relay:8080
      - REPO_URL=${REPO_URL:-https://github.com/registrystack/solmara-lab}
      - SCENARIO_RUNNER_URL=http://scenario-runner:8080
      - SIPF_PENSIONS_RELAY_URL=http://sipf-pensions-relay:8080
      - SOLMARA_LAB_ROOT=/app
      - SRO_SOCIAL_RELAY_URL=http://sro-social-relay:8080
      - STATIC_METADATA_URL=http://static-metadata:8080
      - SOLMARA_PUBLIC_URL_MAP={"child-benefit-notary:8080":"https://child-benefit-notary.solmara.registrystack.org", "pension-notary:8080":"https://pension-notary.solmara.registrystack.org", "nagdi-notary:8080":"https://nagdi-notary.solmara.registrystack.org", "citizen-notary:8080":"https://citizen-notary.solmara.registrystack.org", "cra-civil-relay:8080":"https://cra-relay.solmara.registrystack.org", "nia-population-relay:8080":"https://nia-relay.solmara.registrystack.org", "sro-social-relay:8080":"https://sro-relay.solmara.registrystack.org", "programme-mis-relay:8080":"https://mosd-programme-relay.solmara.registrystack.org", "sipf-pensions-relay:8080":"https://sipf-relay.solmara.registrystack.org", "nagdi-agriculture-relay:8080":"https://nagdi-relay.solmara.registrystack.org", "static-metadata:8080":"https://metadata.solmara.registrystack.org", "portal:4000":"https://portal.solmara.registrystack.org"}
      - UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID:-}
    healthcheck:
      interval: 30s
      retries: 3
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:4301/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      timeout: 10s
    image: ${SOLMARA_HOME_IMAGE:?set digest-pinned Solmara home image}
    labels:
      solmara.lab.host: solmara.registrystack.org
  nagdi-agriculture-relay:
    command:
      - --config
      - /etc/registry-relay/relay.yaml
    depends_on:
      volume-permissions:
        condition: service_completed_successfully
        required: true
    environment:
      NAGDI_CITIZEN_SOURCE_HASH: ${NAGDI_CITIZEN_SOURCE_HASH}
      NAGDI_NOTARY_SOURCE_HASH: ${NAGDI_NOTARY_SOURCE_HASH}
      PORTAL_RELAY_TOKEN_HASH: ${PORTAL_RELAY_TOKEN_HASH}
      REGISTRY_RELAY_AUDIT_HASH_SECRET: ${REGISTRY_RELAY_AUDIT_HASH_SECRET:?.env not loaded; run just gen-secrets once, then just up}
      RUST_LOG: ${RUST_LOG:-info}
    healthcheck:
      interval: 30s
      retries: 3
      test:
        - CMD
        - /usr/local/bin/registry-relay
        - healthcheck
      timeout: 10s
    image: ${REGISTRY_RELAY_IMAGE:-ghcr.io/registrystack/registry-relay@sha256:93e194500a3500ba3f6331d5a0a9a3069127c48a709beccb083a5fcbdbc3ec61}
    labels:
      solmara.lab.host: nagdi-relay.solmara.registrystack.org
    platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
    restart: unless-stopped
    volumes:
      - bind:
          create_host_path: true
        read_only: true
        source: ./ministries/agriculture-nagdi/config/relay.yaml
        target: /etc/registry-relay/relay.yaml
        type: bind
      - bind:
          create_host_path: true
        read_only: true
        source: ./ministries/agriculture-nagdi
        target: /var/lib/solmara/ministries/agriculture-nagdi
        type: bind
      - source: nagdi-agriculture-cache
        target: /var/lib/registry-relay/cache
        type: volume
        volume: {}
      - source: nagdi-agriculture-audit
        target: /var/lib/registry-relay/audit
        type: volume
        volume: {}
  nagdi-notary:
    command:
      - --config
      - /etc/registry-notary/nagdi.yaml
    depends_on:
      nagdi-agriculture-relay:
        condition: service_started
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      NAGDI_CLIENT_TOKEN_HASH: ${NAGDI_CLIENT_TOKEN_HASH}
      NAGDI_NOTARY_ISSUER_JWK: ${NAGDI_NOTARY_ISSUER_JWK}
      NAGDI_NOTARY_SOURCE_RAW: ${NAGDI_NOTARY_SOURCE_RAW}
      REGISTRY_NOTARY_AUDIT_HASH_SECRET: ${REGISTRY_NOTARY_AUDIT_HASH_SECRET:?.env not loaded; run just gen-secrets once, then just up}
      REGISTRY_NOTARY_REDIS_URL: redis://redis:6379/
      REGISTRY_NOTARY_REPLAY_REDIS_URL: ${REGISTRY_NOTARY_REPLAY_REDIS_URL:-redis://redis:6379/0}
      REGISTRY_PLATFORM_REDIS_TEST_URL: redis://redis:6379/
      RUST_LOG: ${RUST_LOG:-info}
    healthcheck:
      interval: 30s
      retries: 3
      test:
        - CMD
        - /usr/local/bin/registry-notary
        - healthcheck
      timeout: 10s
    image: ${REGISTRY_NOTARY_IMAGE:-ghcr.io/registrystack/registry-notary@sha256:0cf05184885d7ed17dd9889e20f3797eb2a9ad07517f4ac7c05c03b774a00b8f}
    labels:
      solmara.lab.host: nagdi-notary.solmara.registrystack.org
    platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
    restart: unless-stopped
    volumes:
      - bind:
          create_host_path: true
        read_only: true
        source: ./notaries/nagdi.yaml
        target: /etc/registry-notary/nagdi.yaml
        type: bind
      - source: nagdi-notary-state
        target: /var/lib/registry-notary/config-state
        type: volume
        volume: {}
  nia-population-relay:
    command:
      - --config
      - /etc/registry-relay/relay.yaml
    depends_on:
      postgres:
        condition: service_healthy
        required: true
      volume-permissions:
        condition: service_completed_successfully
        required: true
    environment:
      DATA_GATE_POSTGRES_ROOT_CERT_PATH: /etc/solmara/postgres/root.crt
      NIA_CHILD_BENEFIT_SOURCE_HASH: ${NIA_CHILD_BENEFIT_SOURCE_HASH}
      NIA_CITIZEN_SOURCE_HASH: ${NIA_CITIZEN_SOURCE_HASH}
      NIA_PENSION_SOURCE_HASH: ${NIA_PENSION_SOURCE_HASH}
      PORTAL_RELAY_TOKEN_HASH: ${PORTAL_RELAY_TOKEN_HASH}
      REGISTRY_RELAY_AUDIT_HASH_SECRET: ${REGISTRY_RELAY_AUDIT_HASH_SECRET:?.env not loaded; run just gen-secrets once, then just up}
      RUST_LOG: ${RUST_LOG:-info}
      SOLMARA_NIA_DATABASE_URL: ${SOLMARA_NIA_DATABASE_URL}
    healthcheck:
      interval: 30s
      retries: 3
      test:
        - CMD
        - /usr/local/bin/registry-relay
        - healthcheck
      timeout: 10s
    image: ${REGISTRY_RELAY_IMAGE:-ghcr.io/registrystack/registry-relay@sha256:93e194500a3500ba3f6331d5a0a9a3069127c48a709beccb083a5fcbdbc3ec61}
    labels:
      solmara.lab.host: nia-relay.solmara.registrystack.org
    platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
    restart: unless-stopped
    volumes:
      - bind:
          create_host_path: true
        read_only: true
        source: ./ministries/interior-population/config/relay.yaml
        target: /etc/registry-relay/relay.yaml
        type: bind
      - bind:
          create_host_path: true
        read_only: true
        source: ./config/postgres/ssl/server.crt
        target: /etc/solmara/postgres/root.crt
        type: bind
      - source: nia-population-cache
        target: /var/lib/registry-relay/cache
        type: volume
        volume: {}
      - source: nia-population-audit
        target: /var/lib/registry-relay/audit
        type: volume
        volume: {}
  pension-notary:
    command:
      - --config
      - /etc/registry-notary/pension.yaml
    depends_on:
      cra-civil-relay:
        condition: service_started
        required: true
      nia-population-relay:
        condition: service_started
        required: true
      programme-mis-relay:
        condition: service_started
        required: true
      redis:
        condition: service_healthy
        required: true
      sipf-pensions-relay:
        condition: service_started
        required: true
    environment:
      CRA_PENSION_SOURCE_RAW: ${CRA_PENSION_SOURCE_RAW}
      NIA_PENSION_SOURCE_RAW: ${NIA_PENSION_SOURCE_RAW}
      PENSION_CLIENT_TOKEN_HASH: ${PENSION_CLIENT_TOKEN_HASH}
      PENSION_NOTARY_ISSUER_JWK: ${PENSION_NOTARY_ISSUER_JWK}
      PROGRAMME_PENSION_SOURCE_RAW: ${PROGRAMME_PENSION_SOURCE_RAW}
      REGISTRY_NOTARY_AUDIT_HASH_SECRET: ${REGISTRY_NOTARY_AUDIT_HASH_SECRET:?.env not loaded; run just gen-secrets once, then just up}
      REGISTRY_NOTARY_REDIS_URL: redis://redis:6379/
      REGISTRY_NOTARY_REPLAY_REDIS_URL: ${REGISTRY_NOTARY_REPLAY_REDIS_URL:-redis://redis:6379/0}
      REGISTRY_PLATFORM_REDIS_TEST_URL: redis://redis:6379/
      RUST_LOG: ${RUST_LOG:-info}
      SIPF_PENSION_SOURCE_RAW: ${SIPF_PENSION_SOURCE_RAW}
    healthcheck:
      interval: 30s
      retries: 3
      test:
        - CMD
        - /usr/local/bin/registry-notary
        - healthcheck
      timeout: 10s
    image: ${REGISTRY_NOTARY_IMAGE:-ghcr.io/registrystack/registry-notary@sha256:0cf05184885d7ed17dd9889e20f3797eb2a9ad07517f4ac7c05c03b774a00b8f}
    labels:
      solmara.lab.host: pension-notary.solmara.registrystack.org
    platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
    restart: unless-stopped
    volumes:
      - bind:
          create_host_path: true
        read_only: true
        source: ./notaries/pension.yaml
        target: /etc/registry-notary/pension.yaml
        type: bind
      - source: pension-notary-state
        target: /var/lib/registry-notary/config-state
        type: volume
        volume: {}
  portal:
    depends_on:
      child-benefit-notary:
        condition: service_healthy
        required: true
      citizen-notary:
        condition: service_healthy
        required: true
      nagdi-notary:
        condition: service_healthy
        required: true
      pension-notary:
        condition: service_healthy
        required: true
      scenario-runner:
        condition: service_healthy
        required: true
    environment:
      CHILD_BENEFIT_NOTARY_TOKEN: ${CHILD_BENEFIT_NOTARY_TOKEN}
      CHILD_BENEFIT_NOTARY_URL: http://child-benefit-notary:8080
      HOST: 0.0.0.0
      NAGDI_NOTARY_TOKEN: ${NAGDI_NOTARY_TOKEN}
      NAGDI_NOTARY_URL: http://nagdi-notary:8080
      PENSION_NOTARY_TOKEN: ${PENSION_NOTARY_TOKEN}
      PENSION_NOTARY_URL: http://pension-notary:8080
      PORT: 4000
      PORTAL_AGRI_RELAY_URL: http://nagdi-agriculture-relay:8080
      PORTAL_CERTS_RELAY_URL: http://cra-civil-relay:8080
      PORTAL_CITIZEN_NOTARY_TOKEN: ${PORTAL_CITIZEN_NOTARY_TOKEN}
      PORTAL_CITIZEN_NOTARY_URL: http://citizen-notary:8080
      PORTAL_CIVIL_RELAY_URL: http://cra-civil-relay:8080
      PORTAL_PROVIDER: live
      PORTAL_RELAY_TOKEN: ${PORTAL_RELAY_TOKEN}
      PORTAL_SESSION_SECRET: ${PORTAL_SESSION_SECRET}
      PORTAL_SOCIAL_RELAY_URL: http://sro-social-relay:8080
      SCENARIO_RUNNER_URL: http://scenario-runner:8080
      STATIC_METADATA_URL: http://static-metadata:8080
    healthcheck:
      interval: 30s
      retries: 3
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:4000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      timeout: 10s
    image: ${SOLMARA_PORTAL_IMAGE:?set digest-pinned Solmara portal image}
    labels:
      solmara.lab.host: portal.solmara.registrystack.org
  postgres:
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/var/lib/postgresql/server-ssl/server.crt
      - -c
      - ssl_key_file=/var/lib/postgresql/server-ssl/server.key
    entrypoint:
      - /bin/sh
      - /usr/local/bin/solmara-postgres-entrypoint.sh
    environment:
      POSTGRES_DB: ${SOLMARA_POSTGRES_DB:-solmara_lab}
      POSTGRES_PASSWORD: ${SOLMARA_POSTGRES_PASSWORD}
      POSTGRES_USER: ${SOLMARA_POSTGRES_USER:-solmara_registry}
    healthcheck:
      interval: 5s
      retries: 10
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      timeout: 5s
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    volumes:
      - source: postgres-data
        target: /var/lib/postgresql/data
        type: volume
        volume: {}
      - bind:
          create_host_path: true
        read_only: true
        source: ./ministries/interior-population/fixtures
        target: /docker-entrypoint-initdb.d
        type: bind
      - bind:
          create_host_path: true
        read_only: true
        source: ./scripts/postgres-entrypoint.sh
        target: /usr/local/bin/solmara-postgres-entrypoint.sh
        type: bind
      - bind:
          create_host_path: true
        read_only: true
        source: ./config/postgres/ssl
        target: /run/solmara-postgres-ssl
        type: bind
  programme-mis-relay:
    command:
      - --config
      - /etc/registry-relay/relay.yaml
    depends_on:
      volume-permissions:
        condition: service_completed_successfully
        required: true
    environment:
      PORTAL_RELAY_TOKEN_HASH: ${PORTAL_RELAY_TOKEN_HASH}
      PROGRAMME_CHILD_BENEFIT_SOURCE_HASH: ${PROGRAMME_CHILD_BENEFIT_SOURCE_HASH}
      PROGRAMME_CITIZEN_SOURCE_HASH: ${PROGRAMME_CITIZEN_SOURCE_HASH}
      PROGRAMME_PENSION_SOURCE_HASH: ${PROGRAMME_PENSION_SOURCE_HASH}
      REGISTRY_RELAY_AUDIT_HASH_SECRET: ${REGISTRY_RELAY_AUDIT_HASH_SECRET:?.env not loaded; run just gen-secrets once, then just up}
      RUST_LOG: ${RUST_LOG:-info}
    healthcheck:
      interval: 30s
      retries: 3
      test:
        - CMD
        - /usr/local/bin/registry-relay
        - healthcheck
      timeout: 10s
    image: ${REGISTRY_RELAY_IMAGE:-ghcr.io/registrystack/registry-relay@sha256:93e194500a3500ba3f6331d5a0a9a3069127c48a709beccb083a5fcbdbc3ec61}
    labels:
      solmara.lab.host: mosd-programme-relay.solmara.registrystack.org
    platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
    restart: unless-stopped
    volumes:
      - bind:
          create_host_path: true
        read_only: true
