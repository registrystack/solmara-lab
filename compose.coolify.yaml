name: solmara-lab-core

# Core hosted Coolify compose. Keep this file and the per-authority
# compose.coolify.*.yaml files free of custom Docker networks; Coolify owns the
# proxy network and domains. Cross-authority calls use public TLS endpoints.

services:
  static-metadata:
    image: ${SOLMARA_STATIC_METADATA_IMAGE:?set digest-pinned Solmara static metadata image}
    command: ["python", "-m", "http.server", "8080", "--bind", "0.0.0.0", "--directory", "/srv/static"]
    labels:
      solmara.lab.host: metadata.solmara.registrystack.org

  scenario-runner:
    image: ${SOLMARA_SCENARIO_RUNNER_IMAGE:?set digest-pinned Solmara scenario runner image}
    environment:
      SCENARIO_RUNNER_HOST: 0.0.0.0
      SCENARIO_RUNNER_PORT: 8080
      SOLMARA_LAB_MODE: hosted
      CHILD_BENEFIT_NOTARY_URL: https://child-benefit-notary.solmara.registrystack.org
      CHILD_BENEFIT_NOTARY_TOKEN: ${CHILD_BENEFIT_NOTARY_TOKEN}
      PENSION_NOTARY_URL: https://pension-notary.solmara.registrystack.org
      PENSION_NOTARY_TOKEN: ${PENSION_NOTARY_TOKEN}
      NAGDI_NOTARY_URL: https://nagdi-notary.solmara.registrystack.org
      NAGDI_NOTARY_TOKEN: ${NAGDI_NOTARY_TOKEN}
      PORTAL_CITIZEN_NOTARY_URL: https://citizen-notary.solmara.registrystack.org
      PORTAL_CITIZEN_NOTARY_TOKEN: ${PORTAL_CITIZEN_NOTARY_TOKEN}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)\""]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      solmara.lab.visibility: internal

  home:
    image: ${SOLMARA_HOME_IMAGE:?set digest-pinned Solmara home image}
    environment:
      HOST: 0.0.0.0
      PORT: 4301
      SOLMARA_LAB_ROOT: /app
      REPO_URL: ${REPO_URL:-https://github.com/registrystack/solmara-lab}
      PORTAL_URL: https://portal.solmara.registrystack.org
      SCENARIO_RUNNER_URL: http://scenario-runner:8080
      STATIC_METADATA_URL: http://static-metadata:8080
      PORTAL_PROBE_URL: http://portal:4000
      CRA_CIVIL_RELAY_URL: https://cra-relay.solmara.registrystack.org
      NIA_POPULATION_RELAY_URL: https://nia-relay.solmara.registrystack.org
      SRO_SOCIAL_RELAY_URL: https://sro-relay.solmara.registrystack.org
      PROGRAMME_MIS_RELAY_URL: https://mosd-programme-relay.solmara.registrystack.org
      SIPF_PENSIONS_RELAY_URL: https://sipf-relay.solmara.registrystack.org
      NAGDI_AGRICULTURE_RELAY_URL: https://nagdi-relay.solmara.registrystack.org
      CHILD_BENEFIT_NOTARY_URL: https://child-benefit-notary.solmara.registrystack.org
      PENSION_NOTARY_URL: https://pension-notary.solmara.registrystack.org
      NAGDI_NOTARY_URL: https://nagdi-notary.solmara.registrystack.org
      PORTAL_CITIZEN_NOTARY_URL: https://citizen-notary.solmara.registrystack.org
      HOME_PUBLISHED_TOKENS: >-
        {"child-benefit-notary":"${CHILD_BENEFIT_NOTARY_TOKEN}",
        "pension-notary":"${PENSION_NOTARY_TOKEN}",
        "nagdi-notary":"${NAGDI_NOTARY_TOKEN}",
        "citizen-notary":"${PORTAL_CITIZEN_NOTARY_TOKEN}"}
      SOLMARA_PUBLIC_URL_MAP: >-
        {"child-benefit-notary:8080":"https://child-benefit-notary.solmara.registrystack.org",
        "pension-notary:8080":"https://pension-notary.solmara.registrystack.org",
        "nagdi-notary:8080":"https://nagdi-notary.solmara.registrystack.org",
        "citizen-notary:8080":"https://citizen-notary.solmara.registrystack.org",
        "cra-civil-relay:8080":"https://cra-relay.solmara.registrystack.org",
        "nia-population-relay:8080":"https://nia-relay.solmara.registrystack.org",
        "sro-social-relay:8080":"https://sro-relay.solmara.registrystack.org",
        "programme-mis-relay:8080":"https://mosd-programme-relay.solmara.registrystack.org",
        "sipf-pensions-relay:8080":"https://sipf-relay.solmara.registrystack.org",
        "nagdi-agriculture-relay:8080":"https://nagdi-relay.solmara.registrystack.org",
        "static-metadata:8080":"https://metadata.solmara.registrystack.org",
        "portal:4000":"https://portal.solmara.registrystack.org"}
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4301/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      static-metadata:
        condition: service_started
      scenario-runner:
        condition: service_healthy
    labels:
      solmara.lab.host: solmara.registrystack.org

  portal:
    image: ${SOLMARA_PORTAL_IMAGE:?set digest-pinned Solmara portal image}
    environment:
      HOST: 0.0.0.0
      PORT: 4000
      PORTAL_PROVIDER: live
      PORTAL_SESSION_SECRET: ${PORTAL_SESSION_SECRET}
      CHILD_BENEFIT_NOTARY_URL: https://child-benefit-notary.solmara.registrystack.org
      CHILD_BENEFIT_NOTARY_TOKEN: ${CHILD_BENEFIT_NOTARY_TOKEN}
      PENSION_NOTARY_URL: https://pension-notary.solmara.registrystack.org
      PENSION_NOTARY_TOKEN: ${PENSION_NOTARY_TOKEN}
      NAGDI_NOTARY_URL: https://nagdi-notary.solmara.registrystack.org
      NAGDI_NOTARY_TOKEN: ${NAGDI_NOTARY_TOKEN}
      PORTAL_CITIZEN_NOTARY_URL: https://citizen-notary.solmara.registrystack.org
      PORTAL_CITIZEN_NOTARY_TOKEN: ${PORTAL_CITIZEN_NOTARY_TOKEN}
      PORTAL_CIVIL_RELAY_URL: https://cra-relay.solmara.registrystack.org
      PORTAL_SOCIAL_RELAY_URL: https://sro-relay.solmara.registrystack.org
      PORTAL_AGRI_RELAY_URL: https://nagdi-relay.solmara.registrystack.org
      PORTAL_CERTS_RELAY_URL: https://cra-relay.solmara.registrystack.org
      PORTAL_RELAY_TOKEN: ${PORTAL_RELAY_TOKEN}
      SCENARIO_RUNNER_URL: http://scenario-runner:8080
      STATIC_METADATA_URL: http://static-metadata:8080
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      scenario-runner:
        condition: service_healthy
    labels:
      solmara.lab.host: portal.solmara.registrystack.org
