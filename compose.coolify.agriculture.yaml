name: solmara-lab-agriculture

x-relay-environment: &relay-environment
  RUST_LOG: ${RUST_LOG:-info}
  REGISTRY_RELAY_AUDIT_HASH_SECRET: ${REGISTRY_RELAY_AUDIT_HASH_SECRET:?set REGISTRY_RELAY_AUDIT_HASH_SECRET}

x-notary-environment: &notary-environment
  RUST_LOG: ${RUST_LOG:-info}
  REGISTRY_NOTARY_AUDIT_HASH_SECRET: ${REGISTRY_NOTARY_AUDIT_HASH_SECRET:?set REGISTRY_NOTARY_AUDIT_HASH_SECRET}
  REGISTRY_NOTARY_REDIS_URL: redis://redis:6379/
  REGISTRY_NOTARY_REPLAY_REDIS_URL: ${REGISTRY_NOTARY_REPLAY_REDIS_URL:-redis://redis:6379/0}
  REGISTRY_PLATFORM_REDIS_TEST_URL: redis://redis:6379/

x-relay-common: &relay-common
  image: ${SOLMARA_RELAY_IMAGE:?set digest-pinned Solmara relay image}
  platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
  restart: unless-stopped
  environment: *relay-environment
  depends_on:
    volume-permissions:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "/usr/local/bin/registry-relay", "healthcheck"]
    interval: 30s
    timeout: 10s
    retries: 3

x-notary-common: &notary-common
  image: ${SOLMARA_NOTARY_IMAGE:?set digest-pinned Solmara notary image}
  platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
  restart: unless-stopped
  environment: *notary-environment
  healthcheck:
    test: ["CMD", "/usr/local/bin/registry-notary", "healthcheck"]
    interval: 30s
    timeout: 10s
    retries: 3
  depends_on:
    volume-permissions:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  volume-permissions:
    image: ${VOLUME_INIT_IMAGE:-busybox:1.36}
    restart: unless-stopped
    command:
      - sh
      - -c
      - chown -R 65532:65532 /relay/* && chown -R 65534:65534 /notary/* && touch /tmp/ready && tail -f /dev/null
    volumes:
      - nagdi-agriculture-cache:/relay/nagdi-agriculture-cache
      - nagdi-agriculture-audit:/relay/nagdi-agriculture-audit
      - nagdi-notary-state:/notary/nagdi-notary-state
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/ready"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: ${REDIS_IMAGE:-redis:7.4-alpine}
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nagdi-agriculture-relay:
    <<: *relay-common
    command: ["--config", "/var/lib/solmara/ministries/agriculture-nagdi/config/relay.yaml"]
    environment:
      <<: *relay-environment
      NAGDI_NOTARY_SOURCE_HASH: ${NAGDI_NOTARY_SOURCE_HASH}
      NAGDI_CITIZEN_SOURCE_HASH: ${NAGDI_CITIZEN_SOURCE_HASH}
      PORTAL_RELAY_TOKEN_HASH: ${PORTAL_RELAY_TOKEN_HASH}
    volumes:
      - nagdi-agriculture-cache:/var/lib/registry-relay/cache
      - nagdi-agriculture-audit:/var/lib/registry-relay/audit
    labels:
      solmara.lab.host: nagdi-relay.solmara.registrystack.org

  nagdi-notary:
    <<: *notary-common
    command: ["--config", "/etc/registry-notary/nagdi.yaml"]
    environment:
      <<: *notary-environment
      NAGDI_CLIENT_TOKEN_HASH: ${NAGDI_CLIENT_TOKEN_HASH}
      NAGDI_NOTARY_ISSUER_JWK: ${NAGDI_NOTARY_ISSUER_JWK}
      NAGDI_NOTARY_SOURCE_RAW: ${NAGDI_NOTARY_SOURCE_RAW}
    volumes:
      - nagdi-notary-state:/var/lib/registry-notary/config-state
    labels:
      solmara.lab.host: nagdi-notary.solmara.registrystack.org

volumes:
  nagdi-agriculture-cache:
  nagdi-agriculture-audit:
  nagdi-notary-state:
