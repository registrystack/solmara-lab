name: solmara-lab-wallet

# Self-hosted walt.id holder wallet for the Solmara hosted demo.
#
# Only the holder side is deployed (wallet-api + web wallet). The Registry
# Notary at citizen-issuer-notary.solmara.registrystack.org is the OID4VCI
# issuer, so walt's issuer-api, verifier-api, and portal are omitted.
#
# Ingress: Caddy is the single public entrypoint. Coolify/Traefik terminates TLS
# for wallet.solmara.registrystack.org and forwards to caddy:7101, which serves
# the web wallet and proxies /wallet-api/* to wallet-api:7001 on the same origin.

x-hosted-domains:
  caddy: wallet.solmara.registrystack.org

services:
  config-loader:
    image: ${CONFIG_LOADER_IMAGE:-alpine:3.20}
    restart: "no"
    environment:
      CONFIG_REPO_URL: ${CONFIG_REPO_URL:-https://github.com/registrystack/solmara-lab}
      CONFIG_REPO_REF: ${CONFIG_REPO_REF:?set CONFIG_REPO_REF to the deployed solmara-lab git ref}
    entrypoint: ["/bin/sh", "-euc"]
    command:
      - |
        apk add --no-cache git >/dev/null
        rm -rf /tmp/repo
        git init /tmp/repo
        git -C /tmp/repo remote add origin "$$CONFIG_REPO_URL"
        git -C /tmp/repo fetch --depth 1 origin "$$CONFIG_REPO_REF"
        git -C /tmp/repo -c advice.detachedHead=false checkout FETCH_HEAD
        for d in walletconf caddy; do
          mkdir -p "/out/$$d"
          find "/out/$$d" -mindepth 1 -delete 2>/dev/null || true
        done
        cp -a /tmp/repo/config/walt/. /out/walletconf/
        rm -f /out/walletconf/Caddyfile /out/walletconf/README.md
        cp -a /tmp/repo/config/walt/Caddyfile /out/caddy/Caddyfile
        echo "config-loader: populated walt config volumes from $$CONFIG_REPO_REF"
    volumes:
      - cfg-walt:/out/walletconf
      - cfg-walt-caddy:/out/caddy

  walt-postgres:
    image: ${WALT_POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: ${WALT_DB_NAME:-waltid}
      POSTGRES_USER: ${WALT_DB_USERNAME:-waltid}
      POSTGRES_PASSWORD: ${WALT_DB_PASSWORD:?set WALT_DB_PASSWORD in Coolify}
    depends_on:
      config-loader:
        condition: service_completed_successfully
    volumes:
      - walt-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  wallet-api:
    image: ${WALT_IMAGE_PREFIX:-docker.io/}waltid/wallet-api:${WALT_IMAGE_TAG:-0.20.2}
    depends_on:
      walt-postgres:
        condition: service_healthy
      config-loader:
        condition: service_completed_successfully
    environment:
      WALLET_BACKEND_PORT: "7001"
      SERVICE_HOST: wallet.solmara.registrystack.org
      DATABASE_ENGINE: postgres
      POSTGRES_DB_HOST: walt-postgres
      POSTGRES_DB_PORT: "5432"
      DB_NAME: ${WALT_DB_NAME:-waltid}
      DB_USERNAME: ${WALT_DB_USERNAME:-waltid}
      DB_PASSWORD: ${WALT_DB_PASSWORD:?set WALT_DB_PASSWORD in Coolify}
      WALT_AUTH_ENCRYPTION_KEY: ${WALT_AUTH_ENCRYPTION_KEY:?set WALT_AUTH_ENCRYPTION_KEY in Coolify}
      WALT_AUTH_SIGN_KEY: ${WALT_AUTH_SIGN_KEY:?set WALT_AUTH_SIGN_KEY in Coolify}
      WALT_AUTH_TOKEN_KEY: ${WALT_AUTH_TOKEN_KEY:?set WALT_AUTH_TOKEN_KEY in Coolify}
      WALT_KTOR_SIGNING_KEY: ${WALT_KTOR_SIGNING_KEY:?set WALT_KTOR_SIGNING_KEY in Coolify}
      WALT_KTOR_VERIFICATION_KEY: ${WALT_KTOR_VERIFICATION_KEY:?set WALT_KTOR_VERIFICATION_KEY in Coolify}
    expose:
      - "7001"
    volumes:
      - cfg-walt:/waltid-wallet-api/config:ro
      - walt-data:/waltid-wallet-api/data
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://127.0.0.1:7001/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  waltid-demo-wallet:
    image: ${WALT_IMAGE_PREFIX:-docker.io/}waltid/waltid-demo-wallet:${WALT_IMAGE_TAG:-0.20.2}
    depends_on:
      wallet-api:
        condition: service_started
    environment:
      NUXT_PUBLIC_ISSUER_CALLBACK_URL: https://wallet.solmara.registrystack.org
      PORT: "7101"
    expose:
      - "7101"
    restart: unless-stopped

  caddy:
    image: ${WALT_CADDY_IMAGE:-docker.io/caddy:2}
    depends_on:
      config-loader:
        condition: service_completed_successfully
      waltid-demo-wallet:
        condition: service_started
      wallet-api:
        condition: service_started
    expose:
      - "7101"
    volumes:
      - cfg-walt-caddy:/etc/caddy:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:7101/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    labels:
      solmara.lab.host: wallet.solmara.registrystack.org

volumes:
  cfg-walt:
  cfg-walt-caddy:
  walt-pgdata:
  walt-data:
