# Login-session signing/encryption material for the wallet-api.
#
# Solmara Lab change: walt ships hard-coded sample keys here (publicly visible
# in the walt-id/waltid-identity repo). Using them in a public deployment would
# let anyone forge wallet login sessions, so they are sourced from the
# environment instead. The `${VAR}` form (no default) fails the config load if a
# value is unset, so the wallet-api refuses to start rather than silently fall
# back to a public key. Set fresh values in Coolify (see the runbook).
encryptionKey = ${WALT_AUTH_ENCRYPTION_KEY} //<128 bit -- key> a 128 bit (16 chars) key
signKey = ${WALT_AUTH_SIGN_KEY} //<128 bit -- key> a 128 bit (16 chars) key

# Available Signing Algorithms are: RS256 or HS256.
# If HS256, then provide the 256+ bit key in the tokenKey field. If RS256, then provide the private key in JWK format in the tokenKey field.
# Solmara Lab uses HS256 with a >=32-char random secret supplied via the environment.
tokenKey = ${WALT_AUTH_TOKEN_KEY} // at least 256 bit (32 chars)

audTokenClaim = "http://${SERVICE_HOST}:${WALLET_BACKEND_PORT}"
issTokenClaim = "http://${SERVICE_HOST}:${WALLET_BACKEND_PORT}"
tokenLifetime = "30"//days
