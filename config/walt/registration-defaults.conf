// Setup what key should be generated on registration
//
// Solmara Lab change: keyType is Ed25519 (walt's stock default is secp256r1).
// The citizen Notary OID4VCI contract only accepts holder proofs signed with
// EdDSA and bound via did:jwk (see config/coolify/notary/citizen-civil-notary.yaml:
// proof_signing_alg_values_supported = [EdDSA], cryptographic_binding_methods
// _supported = [did:jwk]). An Ed25519 jwk key + did:jwk method produces exactly
// that holder binding, so credentials issued by the Notary can be received here.
defaultKeyConfig: {
    backend: jwk
    keyType: Ed25519
}

// Setup what DID should be generated based on above above defined key on registration
defaultDidConfig: {
    method: jwk
}

