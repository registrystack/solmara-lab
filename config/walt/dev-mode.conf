# Solmara Lab change: walt's stock value is `false`, which resolves did:web
# over plain HTTP. The credentials issued by the citizen Notary are signed by
# `did:web:citizen-issuer-notary.solmara.registrystack.org`; the wallet resolves that DID
# (https://citizen-issuer-notary.solmara.registrystack.org/.well-known/did.json) to verify
# and display the credential, so did:web resolution must use HTTPS.
enableDidWebResolverHttps=true
