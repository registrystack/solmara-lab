name: solmara-lab-esignet

services:
  esignet-database:
    image: ${SOLMARA_ESIGNET_POSTGRES_IMAGE:?set digest-pinned Solmara eSignet Postgres image}
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SOLMARA_ESIGNET_POSTGRES_PASSWORD}
    volumes:
      - esignet-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 30

  esignet-redis:
    image: ${ESIGNET_REDIS_IMAGE:-redis:6.0}
    command: ["redis-server"]
    restart: unless-stopped
    volumes:
      - esignet-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 30

  esignet:
    image: ${SOLMARA_ESIGNET_RELAY_IMAGE:?set digest-pinned Solmara eSignet relay image}
    user: root
    restart: unless-stopped
    environment:
      active_profile_env: default,local
      spring_config_label_env: ""
      spring_config_url_env: ""
      hsm_client_zip_url_env: ""
      hsm_local_dir_env: hsm-client
      loader_path_env: /home/mosip/additional_jars/
      work_dir: /home/mosip
      container_user: mosip
      plugin_name_env: esignet-mock-plugin.jar,esignet-relay-authenticator.jar
      plugin_url_env: ""
      plugins_path_env: /home/mosip/plugins
      amr_acr_mapping_file_path_env: /home/mosip/amr_acr_mapping.json
      KAFKA_ENABLED: "false"
      SPRING_AUTOCONFIGURE_EXCLUDE: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      SPRING_CACHE_TYPE: redis
      SPRING_DATA_REDIS_HOST: esignet-redis
      SPRING_REDIS_PASSWORD: ""
      MOSIP_ESIGNET_HOST: esignet.solmara.registrystack.org
      MOSIP_ESIGNET_DISCOVERY_ISSUER_ID: https://esignet.solmara.registrystack.org
      MOSIP_ESIGNET_DISCOVERY_KEY_VALUES: "{'issuer':'https://esignet.solmara.registrystack.org','authorization_endpoint':'https://esignet-ui.solmara.registrystack.org/authorize','token_endpoint':'https://esignet.solmara.registrystack.org/v1/esignet/oauth/v2/token','userinfo_endpoint':'https://esignet.solmara.registrystack.org/v1/esignet/oidc/userinfo','jwks_uri':'https://esignet.solmara.registrystack.org/v1/esignet/oauth/.well-known/jwks.json','token_endpoint_auth_methods_supported':{'private_key_jwt'},'token_endpoint_auth_signing_alg_values_supported':{'RS256','PS256','ES256'}}"
      MOSIP_ESIGNET_OAUTH_KEY_VALUES: "{'issuer':'https://esignet.solmara.registrystack.org','authorization_endpoint':'https://esignet-ui.solmara.registrystack.org/authorize','token_endpoint':'https://esignet.solmara.registrystack.org/v1/esignet/oauth/v2/token','jwks_uri':'https://esignet.solmara.registrystack.org/v1/esignet/oauth/.well-known/jwks.json','token_endpoint_auth_methods_supported':{'private_key_jwt'},'token_endpoint_auth_signing_alg_values_supported':{'RS256','PS256','ES256'}}"
      MOSIP_ESIGNET_DATABASE_URL: jdbc:postgresql://esignet-database:5432/mosip_esignet?currentSchema=esignet
      MOSIP_ESIGNET_DATABASE_USERNAME: postgres
      MOSIP_ESIGNET_DATABASE_PASSWORD: ${SOLMARA_ESIGNET_POSTGRES_PASSWORD}
      MOSIP_ESIGNET_INTEGRATION_SCAN_BASE_PACKAGE: io.mosip.esignet.mock.integration,io.registry.esignet.relay
      MOSIP_ESIGNET_INTEGRATION_AUTHENTICATOR: RelayAuthenticationService
      MOSIP_ESIGNET_INTEGRATION_KEY_BINDER: MockKeyBindingWrapperService
      MOSIP_ESIGNET_OPENID_SCOPE_CLAIMS: "{'profile' : {'name','given_name','family_name','gender','birthdate','individual_id'}}"
      REGISTRY_RELAY_BASE_URL: https://nia-relay.solmara.registrystack.org
      REGISTRY_RELAY_ATTRIBUTE_RELEASE_PROFILE_ID: solmara-nia-userinfo
      REGISTRY_RELAY_ATTRIBUTE_RELEASE_PROFILE_VERSION: v1
      REGISTRY_RELAY_ATTRIBUTE_RELEASE_PURPOSE: https://id.registrystack.org/solmara/purpose/esignet-identity-verification
      REGISTRY_RELAY_AUTH_CREDENTIAL_KIND: api_key
      REGISTRY_RELAY_AUTH_BEARER_TOKEN: ${SOLMARA_ESIGNET_IDENTITY_RELEASE_RAW}
      REGISTRY_RELAY_SUBJECT_ID_TYPE: national_id
      REGISTRY_RELAY_DEFAULT_CLAIMS: individual_id,name,given_name,family_name,birthdate,gender
      REGISTRY_ESIGNET_AUTH_SUPPORTED_FACTORS: OTP
      REGISTRY_ESIGNET_AUTH_OTP_CHANNELS: email,phone
      REGISTRY_ESIGNET_AUTH_OTP_STATIC_ENABLED: "true"
      REGISTRY_ESIGNET_AUTH_OTP_STATIC_VALUE: "111111"
      REGISTRY_ESIGNET_KYC_TOKEN_HMAC_SECRET: ${REGISTRY_ESIGNET_KYC_TOKEN_SECRET}
      REGISTRY_ESIGNET_PSUT_HMAC_SECRET: ${REGISTRY_ESIGNET_PSUT_SECRET}
      REGISTRY_ESIGNET_USER_INFO_ISSUER: https://esignet.solmara.registrystack.org
      REGISTRY_ESIGNET_KYC_SIGNING_KEYSTORE_PATH: /home/mosip/kyc-signing/kyc-signing.p12
      REGISTRY_ESIGNET_KYC_SIGNING_KEYSTORE_TYPE: PKCS12
      REGISTRY_ESIGNET_KYC_SIGNING_KEYSTORE_PASSWORD: ${REGISTRY_ESIGNET_KYC_KEYSTORE_PASSWORD}
      REGISTRY_ESIGNET_KYC_SIGNING_KEY_ALIAS: esignet-relay-kyc
      REGISTRY_ESIGNET_KYC_SIGNING_KEY_PASSWORD: ${REGISTRY_ESIGNET_KYC_KEYSTORE_PASSWORD}
      MOSIP_KERNEL_KEYMANAGER_HSM_CONFIG_PATH: /home/mosip/keystore/esignet_local.p12
    expose:
      - "8088"
    volumes:
      - esignet-keystore:/home/mosip/keystore
      - esignet-kyc-signing:/home/mosip/kyc-signing
    depends_on:
      esignet-database:
        condition: service_healthy
      esignet-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://esignet:8088/v1/esignet/oidc/.well-known/openid-configuration"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 90s
    labels:
      solmara.lab.host: esignet.solmara.registrystack.org

  esignet-ui:
    image: ${SOLMARA_ESIGNET_UI_IMAGE:?set digest-pinned Solmara eSignet UI image}
    user: root
    restart: unless-stopped
    environment:
      container_user: mosip
      DEFAULT_WELLKNOWN: "%5B%7B%22name%22%3A%22OpenID%20Configuration%22%2C%22value%22%3A%22%2F.well-known%2Fopenid-configuration%22%7D%2C%7B%22name%22%3A%22Jwks%20Json%22%2C%22value%22%3A%22%2F.well-known%2Fjwks.json%22%7D%2C%7B%22name%22%3A%22Authorization%20Server%22%2C%22value%22%3A%22%2F.well-known%2Foauth-authorization-server%22%7D%5D"
      SIGN_IN_WITH_ESIGNET_PLUGIN_URL: https://raw.githubusercontent.com/mosip/artifactory-ref-impl/977607990661e864c2adddb9d7de50ea6c651b8f/artifacts/src/mosip-plugins/sign-in-with-esignet/sign-in-with-esignet.zip
      i18n_url_env: ""
      theme_url_env: ""
      images_url_env: ""
    expose:
      - "3000"
    depends_on:
      esignet:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://esignet-ui:3000/.well-known/openid-configuration"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    labels:
      solmara.lab.host: esignet-ui.solmara.registrystack.org

  esignet-seed:
    image: ${SOLMARA_ESIGNET_SEED_IMAGE:?set digest-pinned Solmara eSignet seed image}
    environment:
      PGHOST: esignet-database
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: ${SOLMARA_ESIGNET_POSTGRES_PASSWORD}
      ESIGNET_CLIENT_ID: ${PORTAL_ESIGNET_CLIENT_ID:-solmara-portal}
      ESIGNET_CLIENT_KEY_ID: ${PORTAL_ESIGNET_CLIENT_KEY_ID:-solmara-portal-key-1}
      ESIGNET_CLIENT_PRIVATE_KEY_B64: ${PORTAL_ESIGNET_CLIENT_PRIVATE_KEY_B64}
      ESIGNET_CLIENT_REDIRECT_URIS_JSON: '["https://portal.solmara.registrystack.org/auth/callback"]'
      ESIGNET_REQUIRE_HTTPS_REDIRECTS: "true"
      ESIGNET_REDIS_HOST: esignet-redis
      ESIGNET_ACCOUNT_SOURCE_LABEL: NIA population Relay profile solmara-nia-userinfo
      ESIGNET_DEMO_OTP: "111111"
      ESIGNET_SEED_STAY_READY: "true"
    entrypoint: ["seed-esignet.py"]
    depends_on:
      esignet-database:
        condition: service_healthy
      esignet:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/ready"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  esignet-pgdata:
  esignet-keystore:
  esignet-kyc-signing:
  esignet-redis-data:
