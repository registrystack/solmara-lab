version: 1
id: population
revision: 1
primary_key: uin
schema:
  type: object
  additionalProperties: false
  required: [uin, identity_status, alive]
  properties:
    uin:
      type: string
      maxLength: 16
      pattern: "^[0-9]{10}$"
    identity_status:
      type: string
      maxLength: 32
    alive:
      type: boolean
materialization:
  max_records: 10000000
  max_bytes: 512MiB
  refresh: manual
  retain_generations: 2
