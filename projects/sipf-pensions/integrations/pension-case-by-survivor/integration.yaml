version: 1
id: solmara-sipf-pension-case-by-survivor
revision: 1

input:
  uin:
    role: selector
    type: string
    maxLength: 16
    pattern: "^[0-9]{10}$"

capability:
  snapshot:
    entity: pension_cases
    exact:
      spouse_uin: { input: uin }
    freshness: 24h

outputs: [survivor_eligible]

not_applicable:
  subject_mismatch:
    rationale: The minimized output projection omits spouse_uin, so it contains no identifier comparable with the requested survivor UIN.
    request_fixture: sipf-survivor-case-match
