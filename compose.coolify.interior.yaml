name: solmara-lab-interior

x-relay-environment: &relay-environment
  RUST_LOG: ${RUST_LOG:-info}
  REGISTRY_RELAY_AUDIT_HASH_SECRET: ${REGISTRY_RELAY_AUDIT_HASH_SECRET:?set REGISTRY_RELAY_AUDIT_HASH_SECRET}

x-notary-environment: &notary-environment
  RUST_LOG: ${RUST_LOG:-info}
  REGISTRY_NOTARY_AUDIT_HASH_SECRET: ${REGISTRY_NOTARY_AUDIT_HASH_SECRET:?set REGISTRY_NOTARY_AUDIT_HASH_SECRET}
  REGISTRY_NOTARY_POSTGRES_ROOT_CERT_PATH: /etc/solmara/postgres/root.crt

x-relay-common: &relay-common
  image: ${SOLMARA_RELAY_IMAGE:?set digest-pinned Solmara relay image}
  platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
  restart: unless-stopped
  environment: *relay-environment
  depends_on:
    volume-permissions:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "/usr/local/bin/registry-relay", "healthcheck"]
    interval: 30s
    timeout: 10s
    retries: 3

x-notary-common: &notary-common
  image: ${SOLMARA_NOTARY_IMAGE:?set digest-pinned Solmara notary image}
  platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
  restart: unless-stopped
  environment: *notary-environment
  healthcheck:
    test: ["CMD", "/usr/local/bin/registry-notary", "healthcheck"]
    interval: 30s
    timeout: 10s
    retries: 3
  depends_on:
    volume-permissions:
      condition: service_healthy

services:
  volume-permissions:
    image: ${VOLUME_INIT_IMAGE:-busybox:1.36}
    restart: unless-stopped
    command:
      - sh
      - -c
      - chown -R 65532:65532 /relay/* && chown -R 65534:65534 /notary/* && touch /tmp/ready && tail -f /dev/null
    volumes:
      - cra-civil-cache:/relay/cra-civil-cache
      - cra-civil-audit:/relay/cra-civil-audit
      - nia-population-cache:/relay/nia-population-cache
      - nia-population-audit:/relay/nia-population-audit
      - civil-child-benefit-notary-state:/notary/civil-child-benefit-notary-state
      - nia-child-benefit-notary-state:/notary/nia-child-benefit-notary-state
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/ready"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: ${SOLMARA_POSTGRES_IMAGE:?set digest-pinned Solmara Postgres image}
    entrypoint: ["/bin/sh", "/usr/local/bin/solmara-postgres-entrypoint.sh"]
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/var/lib/postgresql/server-ssl/server.crt
      - -c
      - ssl_key_file=/var/lib/postgresql/server-ssl/server.key
    environment: &postgres-environment
      POSTGRES_USER: ${SOLMARA_POSTGRES_USER:-solmara_registry}
      POSTGRES_PASSWORD: ${SOLMARA_POSTGRES_PASSWORD}
      POSTGRES_DB: ${SOLMARA_POSTGRES_DB:-solmara_lab}
      SOLMARA_NOTARY_DATABASES: civil_child_benefit nia_child_benefit
      CIVIL_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD: ${CIVIL_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD}
      CIVIL_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD: ${CIVIL_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD}
      NIA_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD: ${NIA_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD}
      NIA_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD: ${NIA_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  notary-postgresql-bootstrap:
    image: ${SOLMARA_POSTGRES_IMAGE:?set digest-pinned Solmara Postgres image}
    restart: "no"
    entrypoint: ["/bin/sh", "/docker-entrypoint-initdb.d/010-init-notary-postgresql.sh"]
    environment:
      <<: *postgres-environment
      PGHOST: postgres
      PGPASSWORD: ${SOLMARA_POSTGRES_PASSWORD}
      PGSSLMODE: require
    depends_on:
      postgres:
        condition: service_healthy

  cra-civil-relay:
    <<: *relay-common
    command: ["--config", "/var/lib/solmara/ministries/interior-civil/config/relay.yaml"]
    environment:
      <<: *relay-environment
      CRA_CHILD_BENEFIT_SOURCE_HASH: ${CRA_CHILD_BENEFIT_SOURCE_HASH}
      CRA_PENSION_SOURCE_HASH: ${CRA_PENSION_SOURCE_HASH}
      CRA_CITIZEN_SOURCE_HASH: ${CRA_CITIZEN_SOURCE_HASH}
      PORTAL_RELAY_TOKEN_HASH: ${PORTAL_RELAY_TOKEN_HASH}
    volumes:
      - cra-civil-cache:/var/lib/registry-relay/cache
      - cra-civil-audit:/var/lib/registry-relay/audit
    labels:
      solmara.lab.host: cra-relay.solmara.registrystack.org

  nia-population-relay:
    <<: *relay-common
    command: ["--config", "/var/lib/solmara/ministries/interior-population/config/relay.yaml"]
    environment:
      <<: *relay-environment
      SOLMARA_NIA_DATABASE_URL: ${SOLMARA_NIA_DATABASE_URL}
      DATA_GATE_POSTGRES_ROOT_CERT_PATH: /etc/solmara/postgres/root.crt
      NIA_CHILD_BENEFIT_SOURCE_HASH: ${NIA_CHILD_BENEFIT_SOURCE_HASH}
      NIA_PENSION_SOURCE_HASH: ${NIA_PENSION_SOURCE_HASH}
      NIA_CITIZEN_SOURCE_HASH: ${NIA_CITIZEN_SOURCE_HASH}
      SOLMARA_ESIGNET_IDENTITY_RELEASE_HASH: ${SOLMARA_ESIGNET_IDENTITY_RELEASE_HASH}
      PORTAL_RELAY_TOKEN_HASH: ${PORTAL_RELAY_TOKEN_HASH}
    depends_on:
      volume-permissions:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - nia-population-cache:/var/lib/registry-relay/cache
      - nia-population-audit:/var/lib/registry-relay/audit
    labels:
      solmara.lab.host: nia-relay.solmara.registrystack.org

  civil-child-benefit-notary:
    <<: *notary-common
    command: ["--config", "/etc/registry-notary/child-benefit-civil.yaml"]
    environment: &civil-child-benefit-notary-environment
      <<: *notary-environment
      REGISTRY_NOTARY_POSTGRES_URL: "postgresql://solmara_notary_civil_child_benefit_runtime:${CIVIL_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD}@postgres:5432/solmara_notary_civil_child_benefit?sslmode=require"
      CIVIL_CHILD_BENEFIT_CLIENT_TOKEN_HASH: ${CIVIL_CHILD_BENEFIT_CLIENT_TOKEN_HASH}
      CRA_CHILD_BENEFIT_SOURCE_RAW: ${CRA_CHILD_BENEFIT_SOURCE_RAW}
      CIVIL_CHILD_BENEFIT_FEDERATION_RESPONSE_JWK: ${CIVIL_CHILD_BENEFIT_FEDERATION_RESPONSE_JWK}
      CIVIL_CHILD_BENEFIT_PAIRWISE_SECRET: ${CIVIL_CHILD_BENEFIT_PAIRWISE_SECRET}
    volumes:
      - civil-child-benefit-notary-state:/var/lib/registry-notary/config-state
    depends_on:
      volume-permissions:
        condition: service_healthy
      cra-civil-relay:
        condition: service_healthy
      civil-child-benefit-notary-state-install:
        condition: service_completed_successfully
    labels:
      solmara.lab.host: civil-child-benefit-notary.solmara.registrystack.org

  civil-child-benefit-notary-state-install:
    image: ${SOLMARA_NOTARY_IMAGE:?set digest-pinned Solmara notary image}
    platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
    restart: "no"
    command: ["--config", "/etc/registry-notary/child-benefit-civil.yaml", "state", "install", "--migration-url-env", "REGISTRY_NOTARY_POSTGRES_MIGRATOR_URL", "--owner-role", "solmara_notary_civil_child_benefit_owner", "--runtime-role", "solmara_notary_civil_child_benefit_runtime"]
    environment:
      <<: *civil-child-benefit-notary-environment
      REGISTRY_NOTARY_POSTGRES_MIGRATOR_URL: "postgresql://solmara_notary_civil_child_benefit_migrator:${CIVIL_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD}@postgres:5432/solmara_notary_civil_child_benefit?sslmode=require"
    depends_on:
      notary-postgresql-bootstrap:
        condition: service_completed_successfully

  nia-child-benefit-notary:
    <<: *notary-common
    command: ["--config", "/etc/registry-notary/child-benefit-population.yaml"]
    environment: &nia-child-benefit-notary-environment
      <<: *notary-environment
      REGISTRY_NOTARY_POSTGRES_URL: "postgresql://solmara_notary_nia_child_benefit_runtime:${NIA_CHILD_BENEFIT_NOTARY_POSTGRES_RUNTIME_PASSWORD}@postgres:5432/solmara_notary_nia_child_benefit?sslmode=require"
      NIA_CHILD_BENEFIT_CLIENT_TOKEN_HASH: ${NIA_CHILD_BENEFIT_CLIENT_TOKEN_HASH}
      NIA_CHILD_BENEFIT_SOURCE_RAW: ${NIA_CHILD_BENEFIT_SOURCE_RAW}
      NIA_CHILD_BENEFIT_FEDERATION_RESPONSE_JWK: ${NIA_CHILD_BENEFIT_FEDERATION_RESPONSE_JWK}
      NIA_CHILD_BENEFIT_PAIRWISE_SECRET: ${NIA_CHILD_BENEFIT_PAIRWISE_SECRET}
    volumes:
      - nia-child-benefit-notary-state:/var/lib/registry-notary/config-state
    depends_on:
      volume-permissions:
        condition: service_healthy
      nia-population-relay:
        condition: service_healthy
      nia-child-benefit-notary-state-install:
        condition: service_completed_successfully
    labels:
      solmara.lab.host: nia-child-benefit-notary.solmara.registrystack.org

  nia-child-benefit-notary-state-install:
    image: ${SOLMARA_NOTARY_IMAGE:?set digest-pinned Solmara notary image}
    platform: ${REGISTRY_STACK_PLATFORM:-linux/amd64}
    restart: "no"
    command: ["--config", "/etc/registry-notary/child-benefit-population.yaml", "state", "install", "--migration-url-env", "REGISTRY_NOTARY_POSTGRES_MIGRATOR_URL", "--owner-role", "solmara_notary_nia_child_benefit_owner", "--runtime-role", "solmara_notary_nia_child_benefit_runtime"]
    environment:
      <<: *nia-child-benefit-notary-environment
      REGISTRY_NOTARY_POSTGRES_MIGRATOR_URL: "postgresql://solmara_notary_nia_child_benefit_migrator:${NIA_CHILD_BENEFIT_NOTARY_POSTGRES_MIGRATOR_PASSWORD}@postgres:5432/solmara_notary_nia_child_benefit?sslmode=require"
    depends_on:
      notary-postgresql-bootstrap:
        condition: service_completed_successfully

volumes:
  postgres-data:
  cra-civil-cache:
  cra-civil-audit:
  nia-population-cache:
  nia-population-audit:
  civil-child-benefit-notary-state:
  nia-child-benefit-notary-state:
