server:
  bind: 0.0.0.0:8080
  admin_bind: 0.0.0.0:8081
  openapi_requires_auth: false
  cache_dir: /var/lib/registry-relay/cache

instance:
  id: solmara-cra-civil-relay
  environment: hosted_lab
  owner: Civil Registration Authority
  jurisdiction: XS

catalog:
  title: CRA Civil Registration Relay
  base_url: http://cra-civil-relay:8080
  publisher: Civil Registration Authority
  participant_id: did:web:id.registrystack.org:solmara:authority:cra

vocabularies:
  ps: https://publicschema.org/
  crvs: https://publicschema.org/crvs/
  solmara: https://id.registrystack.org/solmara/

auth:
  mode: api_key
  api_keys:
    - id: cra_child_benefit_source
      fingerprint:
        provider: env
        name: CRA_CHILD_BENEFIT_SOURCE_HASH
      scopes: &cra_scopes
        - cra_civil:metadata
        - cra_civil:rows
        - cra_civil:evidence_verification
    - id: cra_pension_source
      fingerprint:
        provider: env
        name: CRA_PENSION_SOURCE_HASH
      scopes: *cra_scopes
    - id: cra_citizen_source
      fingerprint:
        provider: env
        name: CRA_CITIZEN_SOURCE_HASH
      scopes: *cra_scopes
    - id: portal_relay_reader
      fingerprint:
        provider: env
        name: PORTAL_RELAY_TOKEN_HASH
      scopes:
        - cra_civil:metadata

audit:
  sink: file
  path: /var/lib/registry-relay/audit/audit.jsonl
  format: jsonl
  hash_secret_env: REGISTRY_RELAY_AUDIT_HASH_SECRET

deployment:
  profile: hosted_lab
  evidence:
    ingress_rate_limit: true
    api_key_rotation: true
  waivers:
    - finding: relay.config.unsigned
      reason: first-pass lab config before governed bundle publication
      expires: "2026-10-01"

datasets:
  - id: cra_civil
    title: Solmara civil registration
    description: Birth, death, marriage, and relationship projections maintained by the Civil Registration Authority.
    owner: Civil Registration Authority
    sensitivity: personal
    access_rights: restricted
    update_frequency: daily
    defaults:
      refresh:
        mode: manual
    tables:
      - id: civil_person_table
        materialization: snapshot
        source:
          type: file
          path: /var/lib/solmara/ministries/interior-civil/fixtures/civil_person_projection.csv
          format:
            csv:
              header_row: 1
        primary_key: uin
        schema:
          strict: true
          fields:
            - name: person_id
              type: string
              nullable: false
            - name: uin
              type: string
              nullable: true
              sensitive: true
            - name: given_name
              type: string
              nullable: false
              sensitive: true
            - name: family_name
              type: string
              nullable: false
              sensitive: true
            - name: birth_date
              type: date
              nullable: false
            - name: birth_brn
              type: string
              nullable: true
              sensitive: true
            - name: death_drn
              type: string
              nullable: true
              sensitive: true
            - name: marriage_mrn
              type: string
              nullable: true
              sensitive: true
            - name: deceased
              type: boolean
              nullable: false
            - name: death_date
              type: date
              nullable: true
            - name: cause_of_death
              type: string
              nullable: true
              sensitive: true
            - name: district_code
              type: string
              nullable: false
            - name: observed_at
              type: timestamp
              nullable: true
            - name: source_system
              type: string
              nullable: false
    entities:
      - name: civil_person
        title: Civil person
        description: Minimized civil status projection for evidence checks.
        table: civil_person_table
        concept_uri: crvs:Person
        fields:
          - name: id
            from: uin
            sensitive: true
          - name: person_id
          - name: birth_date
          - name: birth_brn
          - name: death_drn
          - name: marriage_mrn
          - name: deceased
          - name: death_date
          - name: cause_of_death
          - name: district_code
          - name: observed_at
        access:
          metadata_scope: cra_civil:metadata
          aggregate_scope: cra_civil:aggregate
          read_scope: cra_civil:rows
          evidence_verification_scope: cra_civil:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          governed_policy:
            permitted_purposes:
              - https://id.registrystack.org/solmara/purpose/child-benefit-review
              - https://id.registrystack.org/solmara/purpose/pension-payment-review
              - https://id.registrystack.org/solmara/purpose/survivor-benefit-determination
              - https://id.registrystack.org/solmara/purpose/citizen-self-service
            # Notary v0.8.4 forwards Data-Purpose to Registry Data API sources.
            # Legal basis, consent, jurisdiction, and assurance are enforced by
            # Notary source matching with configured credential authorization details.
            redaction_fields:
              - cause_of_death
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: birth_brn
              ops: [eq]
            - field: death_drn
              ops: [eq]
            - field: marriage_mrn
              ops: [eq]
