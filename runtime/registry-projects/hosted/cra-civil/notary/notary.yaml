audit:
  hash_secret_env: REGISTRY_NOTARY_AUDIT_HASH_SECRET
  sink: stdout
auth:
  api_keys:
  - fingerprint:
      name: CRA_CHILD_BENEFIT_CLIENT_TOKEN_HASH
      provider: env
    id: child-benefit-federator
    scopes:
    - evidence:cra:child-benefit:read
  - fingerprint:
      name: CRA_CITIZEN_CLIENT_TOKEN_HASH
      provider: env
    id: citizen-portal
    scopes:
    - evidence:cra:citizen:read
  - fingerprint:
      name: CRA_PENSION_CLIENT_TOKEN_HASH
      provider: env
    id: pension-review-desk
    scopes:
    - evidence:cra:pension:read
cel:
  worker_memory_bytes: 1073741824
deployment:
  profile: hosted_lab
evidence:
  allowed_purposes:
  - https://id.registrystack.org/solmara/purpose/child-benefit-review
  - https://id.registrystack.org/solmara/purpose/citizen-self-service
  - https://id.registrystack.org/solmara/purpose/pension-payment-review
  claims:
  - credential_profiles: []
    disclosure:
      allowed:
      - predicate
      - redacted
      default: predicate
      downgrade: deny
    evidence_mode:
      consultations:
        civil:
          inputs:
            uin: request.target.identifiers.solmara_uin
          outputs:
            birth_brn:
              max_bytes: 128
              nullable: true
              type: string
            birth_date:
              nullable: false
              type: date
            deceased:
              nullable: false
              type: boolean
          profile:
            contract_hash: sha256:fbedcba5fafa3efdf582785abf7cd5d39fb1bbd88db87d0e02a282c2efdf0dbf
            id: solmara-cra-civil.cra-child-benefit.civil
      type: registry_backed
    formats:
    - application/vnd.registry-notary.claim-result+json
    id: birth-is-registered
    purpose: https://id.registrystack.org/solmara/purpose/child-benefit-review
    required_scopes:
    - evidence:cra:child-benefit:read
    rule:
      bindings: {}
      expression: 'civil.matched && civil.birth_brn != null ? civil.birth_brn != '''' : false'
      type: cel
    subject_type: person
    title: birth is registered
    value:
      nullable: false
      type: boolean
    version: '1'
  - credential_profiles: []
    disclosure:
      allowed:
      - predicate
      - redacted
      default: predicate
      downgrade: deny
    evidence_mode:
      consultations:
        civil:
          inputs:
            uin: request.target.identifiers.solmara_uin
          outputs:
            birth_brn:
              max_bytes: 128
              nullable: true
              type: string
            birth_date:
              nullable: false
              type: date
            deceased:
              nullable: false
              type: boolean
          profile:
            contract_hash: sha256:fbedcba5fafa3efdf582785abf7cd5d39fb1bbd88db87d0e02a282c2efdf0dbf
            id: solmara-cra-civil.cra-child-benefit.civil
      type: registry_backed
    formats:
    - application/vnd.registry-notary.claim-result+json
    id: child-age-under-5
    purpose: https://id.registrystack.org/solmara/purpose/child-benefit-review
    required_scopes:
    - evidence:cra:child-benefit:read
    rule:
      bindings: {}
      expression: |-
        civil.matched && civil.birth_date != null && civil.deceased == false
          ? date.age_on(civil.birth_date, as_of_date) >= 0
            && date.age_on(civil.birth_date, as_of_date) < 5
          : false
      type: cel
    subject_type: person
    title: child age under 5
    value:
      nullable: false
      type: boolean
    version: '1'
  - credential_profiles: []
    disclosure:
      allowed:
      - predicate
      - redacted
      default: predicate
      downgrade: deny
    evidence_mode:
      consultations:
        civil:
          inputs:
            uin: request.target.identifiers.solmara_uin
          outputs:
            birth_brn:
              max_bytes: 128
              nullable: true
              type: string
            birth_date:
              nullable: false
              type: date
            deceased:
              nullable: false
              type: boolean
          profile:
            contract_hash: sha256:bf8efcce107cd31707d331a0f2ac8e6203beabb81959226d5fa5f52895319180
            id: solmara-cra-civil.cra-citizen-record.civil
      type: registry_backed
    formats:
    - application/vnd.registry-notary.claim-result+json
    id: civil-record-linked
    purpose: https://id.registrystack.org/solmara/purpose/citizen-self-service
    required_scopes:
    - evidence:cra:citizen:read
    rule:
      bindings: {}
      expression: civil.matched
      type: cel
    subject_type: person
    title: civil record linked
    value:
      nullable: false
      type: boolean
    version: '1'
  - credential_profiles: []
    disclosure:
      allowed:
      - predicate
      - redacted
      default: predicate
      downgrade: deny
    evidence_mode:
      consultations:
        civil:
          inputs:
            uin: request.target.identifiers.solmara_uin
          outputs:
            birth_brn:
              max_bytes: 128
              nullable: true
              type: string
            birth_date:
              nullable: false
              type: date
            deceased:
              nullable: false
              type: boolean
          profile:
            contract_hash: sha256:4402a0e3b84825442d83febb8d65214031e98d39e13306f144786c9e17e3c451
            id: solmara-cra-civil.cra-pension-death.civil
      type: registry_backed
    formats:
    - application/vnd.registry-notary.claim-result+json
    id: person-is-deceased
    purpose: https://id.registrystack.org/solmara/purpose/pension-payment-review
    required_scopes:
    - evidence:cra:pension:read
    rule:
      bindings: {}
      expression: civil.matched && civil.deceased == true
      type: cel
    subject_type: person
    title: person is deceased
    value:
      nullable: false
      type: boolean
    version: '1'
  credential_profiles: {}
  enabled: true
  max_credential_validity_seconds: 600
  relay:
    allow_insecure_localhost: true
    allowed_private_cidrs: []
    base_url: http://127.0.0.1:8080
    max_in_flight: 8
    token_file: /run/secrets/cra-notary-relay-token
    workload_client_id: cra-notary
  service_id: cra-notary
  variables:
    as_of_date:
      from: request.variables.as_of_date
      type: date
instance:
  environment: hosted
  id: cra-notary
server:
  bind: 127.0.0.1:8081
  request_timeout: 30s
state:
  postgresql:
    root_certificate_path: /etc/solmara/postgres/root.crt
    url_env: REGISTRY_NOTARY_POSTGRES_URL
  storage: postgresql
