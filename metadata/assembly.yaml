schema_version: solmara-lab/metadata-assembly/v1
publish_model: merged_multi_authority
publisher:
  service: static-metadata
  manifest: metadata/solmara-wave1.metadata.yaml
  site_root: metadata/public
  output: metadata/public/metadata
  command:
    - registry-manifest-cli
    - publish
    - metadata/solmara-wave1.metadata.yaml
    - --out
    - metadata/public/metadata
    - --site-root
    - metadata/public
  local_command:
    - scripts/publish-metadata.py
    - metadata/assembly.yaml
application_profiles:
  - id: cpsv-ap
    version: 3.2.0
source_fragments:
  - ministries/interior-civil/manifest/fragment.yaml
  - ministries/interior-population/manifest/fragment.yaml
  - ministries/social-development/manifest/sro-fragment.yaml
  - ministries/social-development/manifest/programme-mis-fragment.yaml
  - ministries/labour-pensions/manifest/fragment.yaml
  - ministries/agriculture-nagdi/manifest/fragment.yaml
merged_manifest: metadata/solmara-wave1.metadata.yaml
purpose_catalogue:
  - https://id.registrystack.org/solmara/purpose/child-benefit-review
  - https://id.registrystack.org/solmara/purpose/pension-payment-review
  - https://id.registrystack.org/solmara/purpose/survivor-benefit-determination
  - https://id.registrystack.org/solmara/purpose/voucher-eligibility-review
  - https://id.registrystack.org/solmara/purpose/livestock-movement-control
  - https://id.registrystack.org/solmara/purpose/citizen-self-service
